<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080d14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #eee;
      gap: 14px;
    }

    h1 {
      font-size: 2.2rem;
      color: #4ade80;
      letter-spacing: 0.25em;
      text-shadow: 0 0 24px #4ade8066;
    }

    #hud {
      display: flex;
      gap: 30px;
      font-size: 0.85rem;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #hud .val {
      color: #4ade80;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #canvas-wrap { position: relative; }

    canvas {
      display: block;
      border: 2px solid #0f2a1a;
      border-radius: 6px;
    }

    #bar-wrap {
      width: 100%;
      height: 5px;
      background: #0a0f1a;
      border-radius: 0 0 4px 4px;
      overflow: hidden;
    }

    #grow-bar {
      height: 100%;
      width: 100%;
      border-radius: 3px;
    }

    #restart {
      padding: 0.55rem 1.8rem;
      font-size: 0.95rem;
      font-weight: bold;
      background: #4ade80;
      color: #080d14;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover { background: #22c55e; transform: scale(1.04); }

    #tip { font-size: 0.78rem; color: #2a3a2a; }
  </style>
</head>
<body>

<h1>S N A K E</h1>

<div id="hud">
  <span>Level <span class="val" id="h-level">1</span></span>
  <span>Score <span class="val" id="h-score">0</span></span>
  <span>Length <span class="val" id="h-len">4</span></span>
  <span>Grows in <span class="val" id="h-timer">10</span>s</span>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="bar-wrap"><div id="grow-bar"></div></div>
</div>

<button id="restart">&#9654; Restart</button>
<div id="tip">Arrow keys to steer &nbsp;·&nbsp; Space to restart</div>

<script>
(() => {
  const CELL  = 20;
  const COLS  = 22;  // 25% smaller boundary (30 × 0.75 ≈ 22)
  const ROWS  = 22;
  const W     = CELL * COLS;   // 440
  const H     = CELL * ROWS;   // 440
  const GROW_EVERY  = 10;      // seconds
  const GROW_BY     = 3;       // segments per event
  const BASE_SPEED  = 7;       // cells/sec
  const SPEED_GAIN  = 0.4;     // added per growth

  const canvas = document.getElementById('game');
  canvas.width  = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── state ────────────────────────────────────────────
  let snake, dir, wantDir, dead, score, growCd, speed;
  let lastTs, moveAcc, flashT;
  let barriers = [];

  function reset() {
    snake   = Array.from({length: 20}, (_, i) => ({ x: 20 - i, y: 10 }));
    dir     = { x: 1, y: 0 };
    wantDir = { x: 1, y: 0 };
    dead    = false;
    score   = 0;
    growCd  = GROW_EVERY;
    speed   = BASE_SPEED;
    lastTs  = null;
    moveAcc = 0;
    flashT  = 0;
    barriers = [];
  }

  // ── barrier generation (new layout each level) ────────
  // Each barrier is a connected multi-cell shape (1–7 cells),
  // grown organically from a random seed cell.
  function generateBarriers(lvl) {
    barriers = [];
    if (lvl === 0) return;
    const shapeCount = Math.min(5, lvl + 1);
    const DIRS = [{ x:1,y:0 },{ x:-1,y:0 },{ x:0,y:1 },{ x:0,y:-1 }];
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));

    for (let s = 0; s < shapeCount; s++) {
      // Find a free seed cell
      let sx, sy, found = false;
      for (let a = 0; a < 60; a++) {
        sx = Math.floor(Math.random() * COLS);
        sy = Math.floor(Math.random() * ROWS);
        if (!occupied.has(`${sx},${sy}`)) { found = true; break; }
      }
      if (!found) continue;

      // Grow a connected shape of random size 1–7
      const size  = 1 + Math.floor(Math.random() * 7);
      const shape = [{ x: sx, y: sy }];
      occupied.add(`${sx},${sy}`);

      let tries = 0;
      while (shape.length < size && tries < size * 20) {
        tries++;
        const base = shape[Math.floor(Math.random() * shape.length)];
        const d    = DIRS[Math.floor(Math.random() * 4)];
        const nx   = base.x + d.x;
        const ny   = base.y + d.y;
        const key  = `${nx},${ny}`;
        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !occupied.has(key)) {
          shape.push({ x: nx, y: ny });
          occupied.add(key);
        }
      }

      for (const cell of shape) barriers.push(cell);
    }
  }

  // ── arrow key → direction ─────────────────────────────
  function tryDir(c) {
    // forbid 180° reverse
    if (c.x !== -dir.x || c.y !== -dir.y) wantDir = c;
  }

  // ── advance one cell ─────────────────────────────────
  function advance() {
    dir = { ...wantDir };
    let nx = snake[0].x + dir.x;
    let ny = snake[0].y + dir.y;

    // Edge hit → auto-turn to a random in-bounds direction (not 180° reverse)
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
      const options = [
        { x: 1, y: 0 }, { x: -1, y: 0 },
        { x: 0, y: 1 }, { x: 0, y: -1 },
      ].filter(d =>
        // not a 180° reversal
        (d.x !== -dir.x || d.y !== -dir.y) &&
        // stays in bounds
        snake[0].x + d.x >= 0 && snake[0].x + d.x < COLS &&
        snake[0].y + d.y >= 0 && snake[0].y + d.y < ROWS
      );
      if (options.length === 0) return; // completely cornered, skip step
      const newDir = options[Math.floor(Math.random() * options.length)];
      dir = newDir;
      wantDir = newDir; // player can override with arrow keys next step
      nx = snake[0].x + dir.x;
      ny = snake[0].y + dir.y;
    }

    // barrier — blocked, snake stays put this step (no death)
    for (const b of barriers) {
      if (b.x === nx && b.y === ny) return;
    }

    // self (skip last segment — it vacates this step)
    for (let i = 0; i < snake.length - 1; i++) {
      if (snake[i].x === nx && snake[i].y === ny) { dead = true; return; }
    }

    snake.unshift({ x: nx, y: ny });
    snake.pop();
  }

  function grow() {
    const tail = snake[snake.length - 1];
    for (let i = 0; i < GROW_BY; i++) snake.push({ ...tail });
    score++;
    speed += SPEED_GAIN;
    flashT = 0.45;
    generateBarriers(score); // new barrier layout each level
  }

  // ── draw helpers ─────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y,   x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── render ────────────────────────────────────────────
  function draw() {
    // background
    ctx.fillStyle = '#080d14';
    ctx.fillRect(0, 0, W, H);

    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.022)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, H); ctx.stroke();
    }
    for (let j = 0; j <= ROWS; j++) {
      ctx.beginPath(); ctx.moveTo(0, j * CELL); ctx.lineTo(W, j * CELL); ctx.stroke();
    }

    // grow flash
    if (flashT > 0) {
      ctx.fillStyle = `rgba(74,222,128,${flashT * 0.13})`;
      ctx.fillRect(0, 0, W, H);
    }

    // barriers
    ctx.save();
    ctx.shadowBlur  = 8;
    ctx.shadowColor = '#f97316';
    ctx.fillStyle   = '#7c2d12';
    for (const b of barriers) {
      roundRect(b.x * CELL + 1, b.y * CELL + 1, CELL - 2, CELL - 2, 3);
      ctx.fill();
    }
    ctx.strokeStyle = '#f97316';
    ctx.lineWidth   = 1.5;
    ctx.shadowBlur  = 0;
    for (const b of barriers) {
      roundRect(b.x * CELL + 1, b.y * CELL + 1, CELL - 2, CELL - 2, 3);
      ctx.stroke();
    }
    ctx.restore();

    const n = snake.length;

    // body — render tail→head so head paints last
    for (let i = n - 1; i >= 1; i--) {
      const t = i / (n - 1 || 1);
      const g = Math.round(55 + 110 * (1 - t));
      ctx.fillStyle = `rgb(12, ${g}, 28)`;
      roundRect(snake[i].x * CELL + 2, snake[i].y * CELL + 2, CELL - 4, CELL - 4, 3);
      ctx.fill();
    }

    // head
    const headColor = flashT > 0 ? '#86efac' : '#4ade80';
    ctx.fillStyle = headColor;
    roundRect(snake[0].x * CELL + 1, snake[0].y * CELL + 1, CELL - 2, CELL - 2, 5);
    ctx.fill();

    // head glow
    ctx.save();
    ctx.shadowColor = '#4ade80';
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = 'rgba(74,222,128,0.25)';
    roundRect(snake[0].x * CELL + 1, snake[0].y * CELL + 1, CELL - 2, CELL - 2, 5);
    ctx.fill();
    ctx.restore();

    // eyes
    {
      const cx = (snake[0].x + 0.5) * CELL;
      const cy = (snake[0].y + 0.5) * CELL;
      const px = -dir.y, py = dir.x; // perpendicular
      [
        [cx + px * 4 + dir.x * 3, cy + py * 4 + dir.y * 3],
        [cx - px * 4 + dir.x * 3, cy - py * 4 + dir.y * 3]
      ].forEach(([ex, ey]) => {
        ctx.fillStyle = '#080d14';
        ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex + 0.7, ey - 0.7, 1, 0, Math.PI * 2); ctx.fill();
      });
    }

    // game-over overlay
    if (dead) {
      ctx.fillStyle = 'rgba(8,13,20,0.82)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.save();
      ctx.shadowColor = '#e9456099';
      ctx.shadowBlur  = 22;
      ctx.fillStyle   = '#e94560';
      ctx.font        = 'bold 56px Segoe UI';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 24);
      ctx.restore();

      ctx.fillStyle = '#4ade80';
      ctx.font      = 'bold 26px Segoe UI';
      ctx.fillText(`Level ${score + 1}  ·  Score ${score}  ·  Length ${n}`, W / 2, H / 2 + 24);

      ctx.fillStyle = '#3a4a3a';
      ctx.font      = '17px Segoe UI';
      ctx.fillText('Click RESTART or press Space', W / 2, H / 2 + 64);
    }
  }

  // ── HUD ──────────────────────────────────────────────
  function updateHUD() {
    document.getElementById('h-level').textContent = score + 1;
    document.getElementById('h-score').textContent = score;
    document.getElementById('h-len').textContent   = snake.length;
    document.getElementById('h-timer').textContent = Math.ceil(growCd);

    const pct = (growCd / GROW_EVERY) * 100;
    const bar = document.getElementById('grow-bar');
    bar.style.width      = pct + '%';
    bar.style.background = pct > 50
      ? 'linear-gradient(90deg,#4ade80,#22c55e)'
      : pct > 25
      ? 'linear-gradient(90deg,#facc15,#eab308)'
      : 'linear-gradient(90deg,#e94560,#be123c)';
  }

  // ── game loop ─────────────────────────────────────────
  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.1);
    lastTs = ts;

    if (!dead) {
      if (flashT > 0) flashT -= dt;

      growCd -= dt;
      if (growCd <= 0) { grow(); growCd += GROW_EVERY; }

      moveAcc += dt * speed;
      while (moveAcc >= 1 && !dead) { moveAcc -= 1; advance(); }
    }

    draw();
    updateHUD();
    requestAnimationFrame(loop);
  }

  // ── controls ─────────────────────────────────────────
  document.getElementById('restart').addEventListener('click', reset);
  document.addEventListener('keydown', e => {
    switch (e.code) {
      case 'ArrowUp':    e.preventDefault(); tryDir({ x: 0,  y: -1 }); break;
      case 'ArrowDown':  e.preventDefault(); tryDir({ x: 0,  y:  1 }); break;
      case 'ArrowLeft':  e.preventDefault(); tryDir({ x: -1, y:  0 }); break;
      case 'ArrowRight': e.preventDefault(); tryDir({ x:  1, y:  0 }); break;
      case 'Space':      e.preventDefault(); reset(); break;
    }
  });

  reset();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
