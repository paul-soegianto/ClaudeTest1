<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cave Rescue</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c" width="800" height="480"></canvas>
<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const W = 800, H = 480;
const GRAVITY    = 900;
const JUMP_V     = -430;
const DJUMP_V    = -540;
const PSPEED     = 195;
const WORLD_LEN  = 9000;
const CEIL_Y     = 55;   // cave ceiling Y
const DEATH_Y    = 490;  // fall below this = lose a life

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
let jumpPressed = false, lastUpTime = 0;

document.addEventListener('keydown', e => {
  const gameCodes = ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'];
  if (gameCodes.includes(e.code)) e.preventDefault();
  if (!keys[e.code] && e.code === 'ArrowUp') {
    const now = performance.now();
    // Double-tap: second press while airborne → double-jump
    if (now - lastUpTime < 280 && !player.grounded && player.canDjump) {
      player.vy = DJUMP_V;
      player.canDjump = false;
    } else {
      jumpPressed = true;
    }
    lastUpTime = now;
  }
  keys[e.code] = true;
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── World data ───────────────────────────────────────────────────────────────
let platforms  = []; // { x, w, y }
let stalactites = []; // { wx, w, h }
let lakes      = []; // { x, w, py }
let fires      = []; // { x, w, py }
let ledges     = []; // { x, w, y, aboveLake? }
let prisoner   = { wx: WORLD_LEN - 400, rescued: false };

function generateWorld() {
  platforms = []; stalactites = []; lakes = []; fires = []; ledges = [];
  prisoner.rescued = false;

  // ── Platforms (varying heights, occasional gaps) ──────────────────────────
  let x = 0, y = 370;
  platforms.push({ x, w: 500, y }); x = 500;

  while (x < WORLD_LEN - 650) {
    const gap = 15 + Math.random() * 75;
    x += gap;
    const dy = (Math.random() - 0.42) * 110;
    y = Math.max(215, Math.min(415, y + dy));
    const w = 110 + Math.random() * 230;

    // Hazards on some platforms
    const rng = Math.random();
    if      (rng < 0.12 && w > 160) lakes.push({ x: x + 20, w: Math.min(w - 40, 110), py: y });
    else if (rng < 0.22 && w > 120) fires.push({ x: x + 10, w: 55 + Math.random() * 40, py: y });

    platforms.push({ x, w, y }); x += w;
  }
  platforms.push({ x: WORLD_LEN - 650, w: 650, y: 370 });

  // ── Stalactites ──────────────────────────────────────────────────────────
  for (let wx = 350; wx < WORLD_LEN - 250; wx += 130 + Math.random() * 190) {
    stalactites.push({ wx, w: 13 + Math.random() * 18, h: 30 + Math.random() * 75 });
  }

  // ── Scene ledges — random mid-cave floaters ───────────────────────────
  for (let wx = 900; wx < WORLD_LEN - 900; wx += 380 + Math.random() * 520) {
    ledges.push({ x: wx, w: 75 + Math.random() * 140, y: 195 + Math.random() * 95 });
  }
  // ── Pond ledges — above every lake so hazards are bypassable ─────────
  for (const l of lakes) {
    ledges.push({ x: l.x - 35, w: l.w + 70, y: l.py - 88, aboveLake: true });
  }
}

// Helper: Y of the platform surface at world-x (returns DEATH_Y if no platform)
function platformAt(wx, hw) {
  hw = hw || 10;
  for (const p of platforms) {
    if (wx + hw > p.x && wx - hw < p.x + p.w) return p.y;
  }
  return DEATH_Y;
}

// ─── Game objects ─────────────────────────────────────────────────────────────
let player, enemies, pBullets, eBullets, particles;
let cameraX = 0, score, gameState = 'menu', lastTime = 0;

function makePlayer() {
  player = {
    wx: 130, y: 370,
    vy: 0, vx: 0,
    grounded: false, canDjump: false,
    lives: 3, invincible: 0,
    shootCD: 0,
    w: 20, h: 38,
    phase: 0,
    facing: 1,
    onLedge: false,
    passThroughLedge: 0,
  };
}

function spawnEnemies() {
  enemies = [];
  for (let wx = 1100; wx < WORLD_LEN - 750; wx += 320 + Math.random() * 360) {
    const type  = ['snake','dwarf','bird'][Math.floor(Math.random() * 3)];
    const isBird = type === 'bird';
    const py = platformAt(wx, 12);
    enemies.push({
      wx,
      y:         isBird ? CEIL_Y + 85 + Math.random() * 70 : (py < DEATH_Y ? py : 370),
      type,
      active:    false,
      hp:        type === 'snake' ? 2 : type === 'dwarf' ? 1 : 2,
      maxHp:     type === 'snake' ? 2 : type === 'dwarf' ? 1 : 2,
      vy:        0,
      vx:        type === 'dwarf' ? -130 : type === 'snake' ? -55 : 0,
      grounded:  !isBird,
      shootCD:   80 + Math.random() * 90,
      phase:     Math.random() * Math.PI * 2,
    });
  }
}

function startGame() {
  score = 0;
  generateWorld();
  makePlayer();
  spawnEnemies();
  pBullets = []; eBullets = []; particles = [];
  cameraX  = 0;
  gameState = 'playing';
}

// ─── Particles ────────────────────────────────────────────────────────────────
function addParticles(wx, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 45 + Math.random() * 160;
    const life = 0.3 + Math.random() * 0.5;
    particles.push({ wx, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp, color, life, maxLife: life, sz: 2+Math.random()*3 });
  }
}

function sx(wx) { return wx - cameraX; }  // world → screen X

// ─── Update ───────────────────────────────────────────────────────────────────
function update(dt) {

  // Activate enemies that enter view range
  for (const e of enemies) {
    if (!e.active && e.wx < cameraX + W + 700) e.active = true;
  }

  // ── Player horizontal ────────────────────────────────────────────────────
  if      (keys['ArrowRight']) player.vx =  PSPEED;
  else if (keys['ArrowLeft'])  player.vx = -PSPEED * 0.6;  // slower left, can't retreat fast
  else                         player.vx *= 0.75;

  player.wx = Math.max(cameraX + 30, Math.min(WORLD_LEN - 60, player.wx + player.vx * dt));
  if (player.vx > 5) player.facing = 1;
  else if (player.vx < -5) player.facing = -1;

  // ── Gravity + vertical ───────────────────────────────────────────────────
  player.vy += GRAVITY * dt;

  if (jumpPressed) {
    jumpPressed = false;
    if (player.grounded) {
      player.vy     = JUMP_V;
      player.grounded = false;
      player.canDjump = true;
    }
  }

  player.y += player.vy * dt;

  // Platform landing
  const fy = platformAt(player.wx, player.w / 2);
  player.grounded = false;
  if (fy < DEATH_Y && player.y >= fy && player.vy >= 0) {
    player.y = fy; player.vy = 0; player.grounded = true; player.canDjump = false;
  }

  // Ledge collision & drop-through
  player.passThroughLedge = Math.max(0, player.passThroughLedge - dt);
  if (keys['ArrowDown'] && player.onLedge) {
    player.passThroughLedge = 0.4; player.onLedge = false;
    player.grounded = false; player.vy = 30;
  }
  if (!player.grounded && player.passThroughLedge <= 0) {
    player.onLedge = false;
    for (const l of ledges) {
      if (player.vy >= 0
          && player.wx + player.w/2 > l.x && player.wx - player.w/2 < l.x + l.w
          && player.y >= l.y && player.y <= l.y + 18) {
        player.y = l.y; player.vy = 0;
        player.grounded = true; player.canDjump = false; player.onLedge = true;
        break;
      }
    }
  } else {
    player.onLedge = false;
  }

  // Fall death
  if (player.y > DEATH_Y - 5) { hurtPlayer(); return; }

  // Ceiling
  if (player.y - player.h < CEIL_Y) { player.y = CEIL_Y + player.h; player.vy = Math.max(0, player.vy); }

  // Camera: one-directional, never scrolls back
  cameraX = Math.max(cameraX, player.wx - 200);

  // ── Shoot ────────────────────────────────────────────────────────────────
  if (player.shootCD > 0) player.shootCD--;
  if (keys['Space'] && player.shootCD <= 0) {
    let aimAngle = 0;
    if (keys['ArrowUp'])   aimAngle = -Math.PI / 5.5;
    if (keys['ArrowDown']) aimAngle =  Math.PI / 5.5;
    const fd = player.facing;
    pBullets.push({ wx: player.wx + fd * 16, y: player.y - player.h * 0.48,
                    vx: fd * 530 * Math.cos(aimAngle),
                    vy: 530 * Math.sin(aimAngle) });
    player.shootCD = 14;
  }

  player.invincible = Math.max(0, player.invincible - dt);
  player.phase     += dt * 2.2;

  // ── Player bullets ───────────────────────────────────────────────────────
  for (let i = pBullets.length - 1; i >= 0; i--) {
    const b = pBullets[i];
    b.wx += b.vx * dt;
    b.y  += b.vy * dt;
    if (b.wx > cameraX + W + 80 || b.wx < cameraX - 80 || b.y < CEIL_Y || b.y > H + 40) { pBullets.splice(i, 1); continue; }
    let hit = false;
    for (const e of enemies) {
      if (!e.active || e.hp <= 0) continue;
      if (Math.abs(e.wx - b.wx) < 28 && Math.abs(e.y - b.y) < 28) {
        e.hp--;
        addParticles(b.wx, b.y, '#00ff88', 7);
        if (e.hp <= 0) { score += 100; addParticles(e.wx, e.y, '#ffaa00', 20); }
        pBullets.splice(i, 1); hit = true; break;
      }
    }
    if (hit) continue;
  }

  // ── Enemies ──────────────────────────────────────────────────────────────
  for (const e of enemies) {
    if (!e.active || e.hp <= 0) continue;

    // ── SNAKE: slow ground walker, shoots horizontally ────────────────────
    if (e.type === 'snake') {
      e.wx += e.vx * dt;
      const efy = platformAt(e.wx, 12);
      if (efy >= DEATH_Y) {
        e.wx -= e.vx * dt * 2; e.vx *= -1; // reverse at edge/gap
      } else {
        e.y = efy;
        // Also reverse if walking into a wall (going toward where platform disappears)
        const ahead = platformAt(e.wx + (e.vx > 0 ? 40 : -40), 5);
        if (ahead >= DEATH_Y) e.vx *= -1;
      }
      // Shoot toward player if on roughly same level
      e.shootCD--;
      if (e.shootCD <= 0 && Math.abs(player.y - e.y) < 90) {
        e.shootCD = 95 + Math.floor(Math.random() * 65);
        const dir = player.wx < e.wx ? -1 : 1;
        eBullets.push({ wx: e.wx + dir * 30, y: e.y - 12, vx: dir * 200, vy: 0, color: '#88ff00' });
      }

    // ── DWARF: fast melee walker, jumps at edges, no shooting ─────────────
    } else if (e.type === 'dwarf') {
      const dir = player.wx < e.wx ? -1 : 1;
      e.vx = dir * 135;
      e.wx += e.vx * dt;

      // Reverse if about to fall off edge
      const ahead = platformAt(e.wx + dir * 35, 5);
      if (ahead >= DEATH_Y) {
        e.wx -= e.vx * dt * 2;
        // Jump if grounded and player is on different level
        if (e.grounded && Math.random() < 0.05) { e.vy = JUMP_V * 0.8; e.grounded = false; }
      }

      // Gravity
      e.vy += GRAVITY * dt;
      e.y  += e.vy * dt;
      const dfy = platformAt(e.wx, 10);
      if (dfy < DEATH_Y && e.y >= dfy && e.vy >= 0) { e.y = dfy; e.vy = 0; e.grounded = true; }

      // Contact damage
      if (player.invincible <= 0 && Math.abs(e.wx - player.wx) < 24 && Math.abs(e.y - player.y) < 32) {
        hurtPlayer();
      }

    // ── BIRD: flies with sine wave at medium height, shoots toward player ──
    } else if (e.type === 'bird') {
      e.phase += dt * 1.6;
      // Hover slightly ahead of player (to the right), drift left gently
      const targetWX = player.wx + 80;
      e.wx += (targetWX - e.wx) * 0.55 * dt - 45 * dt;
      e.y   = CEIL_Y + 90 + Math.sin(e.phase) * 50;

      // Shoot toward player (angled downward)
      e.shootCD--;
      if (e.shootCD <= 0 && Math.abs(player.wx - e.wx) < 250 && player.y > e.y) {
        e.shootCD = 75 + Math.floor(Math.random() * 55);
        const ang = Math.atan2((player.y - player.h/2) - e.y, player.wx - e.wx);
        eBullets.push({ wx: e.wx, y: e.y + 15, vx: Math.cos(ang) * 230, vy: Math.sin(ang) * 230, color: '#ff8800' });
      }
    }
  }

  // ── Enemy bullets ─────────────────────────────────────────────────────────
  for (let i = eBullets.length - 1; i >= 0; i--) {
    const b = eBullets[i];
    b.wx += b.vx * dt;
    b.y  += b.vy * dt;
    if (b.wx < cameraX - 80 || b.wx > cameraX + W + 80 || b.y > H + 40) { eBullets.splice(i, 1); continue; }
    if (player.invincible <= 0 && Math.abs(b.wx - player.wx) < 15 && Math.abs(b.y - (player.y - player.h/2)) < 20) {
      eBullets.splice(i, 1); hurtPlayer();
    }
  }

  // ── Hazards (lakes, fire) ─────────────────────────────────────────────────
  if (player.invincible <= 0 && player.grounded) {
    for (const l of lakes) { if (player.wx > l.x && player.wx < l.x + l.w) { hurtPlayer(); break; } }
    for (const f of fires) { if (player.wx > f.x && player.wx < f.x + f.w) { hurtPlayer(); break; } }
  }

  // ── Prisoner rescue ───────────────────────────────────────────────────────
  if (!prisoner.rescued && Math.abs(player.wx - prisoner.wx) < 50) {
    prisoner.rescued = true; score += 1000; gameState = 'win';
  }

  // ── Particles ─────────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.wx   += p.vx * dt; p.y += p.vy * dt;
    p.vy   += 280 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function hurtPlayer() {
  addParticles(player.wx, player.y - player.h / 2, '#00ff88', 14);
  player.lives--;
  player.invincible = 2;
  if (player.lives <= 0) { gameState = 'gameover'; return; }
  // Respawn on nearest safe platform behind player
  const safe = [...platforms].reverse().find(p => p.x + p.w < player.wx + 150 && p.y < DEATH_Y);
  if (safe) { player.wx = safe.x + safe.w / 2; player.y = safe.y; player.vy = 0; }
  player.onLedge = false; player.passThroughLedge = 0;
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────
function glowText(txt, x, y, color, size) {
  ctx.save(); ctx.textAlign = 'center';
  ctx.font = `bold ${size}px monospace`;
  ctx.shadowBlur = 28; ctx.shadowColor = color; ctx.fillStyle = color;
  ctx.fillText(txt, x, y); ctx.restore();
}
function blinkText(txt, x, y, color, size) {
  if (Math.floor(Date.now() / 500) % 2 === 0) glowText(txt, x, y, color, size);
}

// ─── Draw: background ─────────────────────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#0c0608'); g.addColorStop(1, '#180c04');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // Distant cave glow spots
  for (let i = 0; i < 4; i++) {
    const bx = (((i * 237 + 50) - cameraX * 0.12) % (W + 300) + W + 300) % (W + 300) - 100;
    const by = 160 + i * 70;
    const gr = ctx.createRadialGradient(bx, by, 0, bx, by, 130);
    gr.addColorStop(0, 'rgba(70,25,10,0.14)'); gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);
  }
}

// ─── Draw: cave structure ──────────────────────────────────────────────────────
function drawCave() {
  // Rock ceiling
  ctx.fillStyle = '#1b0a05';
  ctx.fillRect(0, 0, W, CEIL_Y);

  // Jagged ceiling edge
  ctx.fillStyle = '#261005';
  ctx.beginPath(); ctx.moveTo(0, CEIL_Y + 12);
  for (let x = 0; x <= W; x += 30) {
    const wx = cameraX + x;
    const jag = Math.sin(wx * 0.035) * 7 + Math.sin(wx * 0.012) * 5;
    ctx.lineTo(x, CEIL_Y + jag);
  }
  ctx.lineTo(W, 0); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();

  // Platform ledges
  for (const p of platforms) {
    const px = sx(p.x);
    if (px + p.w < 0 || px > W) continue;
    // Surface highlight
    ctx.fillStyle = '#4a2410'; ctx.fillRect(px, p.y, p.w, 7);
    // Body (solid rock)
    ctx.fillStyle = '#281208'; ctx.fillRect(px, p.y + 7, p.w, H - p.y);
    // Top edge glow
    ctx.strokeStyle = '#7a4020'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(px, p.y); ctx.lineTo(px + p.w, p.y); ctx.stroke();
    // Stone cracks
    ctx.strokeStyle = '#1a0a04'; ctx.lineWidth = 1;
    for (let ci = 1; ci < 4; ci++) {
      const cx = px + p.w * ci / 4;
      ctx.beginPath(); ctx.moveTo(cx, p.y+3); ctx.lineTo(cx + 8, p.y + 14); ctx.stroke();
    }
  }
}

function drawStalactites() {
  for (const s of stalactites) {
    const x = sx(s.wx);
    if (x < -50 || x > W + 50) continue;
    ctx.fillStyle = '#22100a';
    ctx.strokeStyle = '#4a2010'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - s.w / 2, CEIL_Y + 6);
    ctx.lineTo(x + s.w / 2, CEIL_Y + 6);
    ctx.lineTo(x, CEIL_Y + s.h);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // Drip highlight
    ctx.fillStyle = 'rgba(120,60,20,0.4)';
    ctx.beginPath(); ctx.arc(x, CEIL_Y + s.h, 3, 0, Math.PI * 2); ctx.fill();
  }
}

function drawLedges() {
  for (const l of ledges) {
    const lx = sx(l.x);
    if (lx + l.w < 0 || lx > W) continue;
    if (l.aboveLake) {
      ctx.fillStyle = '#1a3422'; ctx.fillRect(lx, l.y, l.w, 10);
      ctx.fillStyle = '#2a5535'; ctx.fillRect(lx, l.y, l.w, 3);
      ctx.save();
      ctx.shadowBlur = 6; ctx.shadowColor = '#3aaa55';
      ctx.strokeStyle = '#3aaa55'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(lx, l.y); ctx.lineTo(lx + l.w, l.y); ctx.stroke();
      ctx.restore();
      ctx.strokeStyle = '#1a3020'; ctx.lineWidth = 1;
    } else {
      ctx.fillStyle = '#2e1a0e'; ctx.fillRect(lx, l.y, l.w, 10);
      ctx.fillStyle = '#4a2a12'; ctx.fillRect(lx, l.y, l.w, 3);
      ctx.save();
      ctx.shadowBlur = 4; ctx.shadowColor = '#6a3a18';
      ctx.strokeStyle = '#6a3a18'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(lx, l.y); ctx.lineTo(lx + l.w, l.y); ctx.stroke();
      ctx.restore();
      ctx.strokeStyle = '#1a0e06'; ctx.lineWidth = 1;
    }
    // Crack lines on top surface
    for (let ci = 1; ci < 3; ci++) {
      const crx = lx + l.w * ci / 3;
      ctx.beginPath(); ctx.moveTo(crx, l.y + 2); ctx.lineTo(crx + 6, l.y + 7); ctx.stroke();
    }
    // Triangle drips from underside
    ctx.fillStyle = l.aboveLake ? '#2a5535' : '#3a1a0a';
    for (let di = 1; di < 4; di++) {
      const dx = lx + l.w * di / 4;
      ctx.beginPath(); ctx.moveTo(dx - 4, l.y + 10); ctx.lineTo(dx + 4, l.y + 10); ctx.lineTo(dx, l.y + 17); ctx.closePath(); ctx.fill();
    }
  }
}

function drawHazards() {
  const t = Date.now() / 180;
  // Lakes
  for (const l of lakes) {
    const lx = sx(l.x);
    if (lx + l.w < 0 || lx > W) continue;
    ctx.save();
    ctx.fillStyle = 'rgba(10,45,190,0.8)'; ctx.shadowBlur = 14; ctx.shadowColor = '#1035ee';
    ctx.fillRect(lx, l.py - 11, l.w, 12);
    ctx.fillStyle = 'rgba(80,140,255,0.25)'; ctx.fillRect(lx + 4, l.py - 9, l.w * 0.5, 3);
    ctx.restore();
  }
  // Fires
  for (const f of fires) {
    const fx = sx(f.x);
    if (fx + f.w < 0 || fx > W) continue;
    for (let i = 0; i < 7; i++) {
      const fxo   = f.w * i / 7;
      const flick = 0.55 + Math.sin(t + i * 1.8) * 0.45;
      const fh    = (20 + Math.sin(t * 1.3 + i) * 9) * flick;
      ctx.save();
      ctx.shadowBlur = 10; ctx.shadowColor = '#ff5500';
      ctx.fillStyle = `rgba(255,${Math.floor(50 + flick * 110)},0,${flick * 0.9})`;
      ctx.beginPath(); ctx.arc(fx + fxo + f.w / 14, f.py - fh * 0.55, f.w / 10, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
  }
}

// ─── Draw: prisoner ───────────────────────────────────────────────────────────
function drawPrisoner() {
  const px = sx(prisoner.wx);
  if (px < -70 || px > W + 70) return;
  let py = 370;
  for (const p of platforms) { if (prisoner.wx >= p.x && prisoner.wx <= p.x + p.w) { py = p.y; break; } }

  const t = Date.now() / 480;
  // Cage bars
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(px - 18 + i * 12, py - 66); ctx.lineTo(px - 18 + i * 12, py); ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(px - 20, py - 66); ctx.lineTo(px + 20, py - 66); ctx.stroke();
  // Figure
  ctx.fillStyle = '#ffaa66';
  ctx.beginPath(); ctx.arc(px, py - 53, 8, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#dd8844'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(px, py - 45); ctx.lineTo(px, py - 24);
  ctx.moveTo(px, py - 39); ctx.lineTo(px - 11, py - 32 + Math.sin(t) * 5);
  ctx.moveTo(px, py - 39); ctx.lineTo(px + 11, py - 32 + Math.sin(t + Math.PI) * 5);
  ctx.stroke();
  // Glow + label
  ctx.save(); ctx.shadowBlur = 18; ctx.shadowColor = '#ffcc00';
  ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(px, py - 53, 11, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#ffee44'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
  ctx.shadowBlur = 8; ctx.shadowColor = '#ffcc00';
  ctx.fillText('SAVE ME!', px, py - 78); ctx.shadowBlur = 0;
}

// ─── Draw: enemies ────────────────────────────────────────────────────────────
function drawSnake(e) {
  const ex = sx(e.wx);
  const fd = e.vx >= 0 ? 1 : -1; // face direction
  ctx.save(); ctx.shadowBlur = 8; ctx.shadowColor = '#66ff00';
  // Body segments
  for (let i = 4; i >= 1; i--) {
    const bx = ex + i * 13 * -fd;
    const by = e.y - 9 + Math.sin(Date.now() / 180 + i) * 5;
    ctx.fillStyle = i === 1 ? '#3a8800' : '#2a6200';
    ctx.beginPath(); ctx.ellipse(bx, by, 10 - i*0.5, 8 - i*0.4, 0, 0, Math.PI * 2); ctx.fill();
  }
  // Head
  ctx.fillStyle = '#55cc00';
  ctx.beginPath(); ctx.ellipse(ex, e.y - 10, 14, 11, 0, 0, Math.PI * 2); ctx.fill();
  // Eye
  ctx.fillStyle = '#ffff00';
  ctx.beginPath(); ctx.arc(ex + 5 * fd, e.y - 14, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ex + 6 * fd, e.y - 14, 1.5, 0, Math.PI * 2); ctx.fill();
  // Forked tongue
  ctx.strokeStyle = '#ff2244'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ex + 13 * fd, e.y - 8);
  ctx.lineTo(ex + 20 * fd, e.y - 8);
  ctx.moveTo(ex + 20 * fd, e.y - 8);
  ctx.lineTo(ex + 24 * fd, e.y - 5);
  ctx.moveTo(ex + 20 * fd, e.y - 8);
  ctx.lineTo(ex + 24 * fd, e.y - 11);
  ctx.stroke();
  ctx.restore();
}

function drawDwarf(e) {
  const ex = sx(e.wx);
  const fd = e.vx >= 0 ? 1 : -1;
  ctx.save(); ctx.shadowBlur = 6; ctx.shadowColor = '#885500';
  ctx.fillStyle = '#774400'; ctx.fillRect(ex - 9, e.y - 30, 18, 24); // body
  ctx.fillStyle = '#aa6600'; ctx.beginPath(); ctx.arc(ex, e.y - 34, 11, 0, Math.PI * 2); ctx.fill(); // head
  ctx.fillStyle = '#555'; ctx.fillRect(ex - 12, e.y - 44, 24, 12); // helmet
  ctx.fillStyle = '#ff5500';
  ctx.beginPath(); ctx.arc(ex - 4, e.y - 36, 3, 0, Math.PI * 2); ctx.fill(); // eyes
  ctx.beginPath(); ctx.arc(ex + 4, e.y - 36, 3, 0, Math.PI * 2); ctx.fill();
  // Axe
  ctx.fillStyle = '#bbb'; ctx.fillRect(ex + 9*fd, e.y - 40, 3, 18);
  ctx.fillStyle = '#ddd'; ctx.fillRect(ex + 9*fd, e.y - 43, 9*fd > 0 ? 10 : -10, 10);
  ctx.restore();
}

function drawBird(e) {
  const ex = sx(e.wx);
  const t  = Date.now() / 140;
  ctx.save(); ctx.shadowBlur = 12; ctx.shadowColor = '#ff6600';
  ctx.fillStyle = '#882200';
  // Left wing
  ctx.beginPath(); ctx.moveTo(ex, e.y);
  ctx.lineTo(ex - 38, e.y - 14 + Math.sin(t) * 12);
  ctx.lineTo(ex - 24, e.y + 9); ctx.closePath(); ctx.fill();
  // Right wing
  ctx.beginPath(); ctx.moveTo(ex, e.y);
  ctx.lineTo(ex + 38, e.y - 14 + Math.sin(t + 0.4) * 12);
  ctx.lineTo(ex + 24, e.y + 9); ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle = '#cc3300';
  ctx.beginPath(); ctx.ellipse(ex, e.y, 14, 11, 0, 0, Math.PI * 2); ctx.fill();
  // Head + beak
  ctx.fillStyle = '#dd3300';
  ctx.beginPath(); ctx.arc(ex - 12, e.y - 4, 9, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.moveTo(ex - 20, e.y - 2); ctx.lineTo(ex - 30, e.y + 2); ctx.lineTo(ex - 20, e.y + 6); ctx.closePath(); ctx.fill();
  // Eye
  ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(ex - 15, e.y - 6, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';    ctx.beginPath(); ctx.arc(ex - 15, e.y - 6, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.active || e.hp <= 0) continue;
    const ex = sx(e.wx);
    if (ex < -90 || ex > W + 90) continue;
    if      (e.type === 'snake') drawSnake(e);
    else if (e.type === 'dwarf') drawDwarf(e);
    else                         drawBird(e);
    // HP bar (multi-hit enemies)
    if (e.maxHp > 1) {
      const bw = 30, barY = e.y - (e.type === 'bird' ? 28 : 60);
      ctx.fillStyle = '#333'; ctx.fillRect(ex - bw/2, barY, bw, 4);
      ctx.fillStyle = `hsl(${(e.hp/e.maxHp)*120},100%,50%)`;
      ctx.fillRect(ex - bw/2, barY, bw * (e.hp/e.maxHp), 4);
    }
  }
}

// ─── Draw: player (Green Lantern) ─────────────────────────────────────────────
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(Date.now() / 80) % 2 === 0) return;
  const px = sx(player.wx);
  const py = player.y;
  const pulse = 0.5 + Math.sin(player.phase) * 0.5;
  const fd = player.facing;

  ctx.save();

  // Outer aura ring (GL energy field)
  ctx.shadowBlur = 0;
  ctx.strokeStyle = `rgba(0,255,68,${0.08 + pulse * 0.07})`;
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(px, py - player.h / 2, 24 + pulse * 3, 0, Math.PI * 2); ctx.stroke();

  ctx.shadowBlur = 18; ctx.shadowColor = '#00ff44';

  // Cape (dark green triangle flowing behind player, flaps with phase)
  const capeFlap = Math.sin(player.phase * 1.3) * 6;
  ctx.fillStyle = '#002b14';
  ctx.beginPath();
  ctx.moveTo(px - fd * 8, py - player.h + 12);
  ctx.lineTo(px - fd * 22 + capeFlap * fd, py - player.h / 2);
  ctx.lineTo(px - fd * 14, py - 2);
  ctx.closePath(); ctx.fill();

  // Legs
  ctx.fillStyle = '#003318'; ctx.shadowBlur = 6;
  ctx.fillRect(px - 9, py - 13, 7, 13);
  ctx.fillRect(px + 2, py - 13, 7, 13);

  // Body (suit)
  ctx.fillStyle = '#004422';
  ctx.fillRect(px - 10, py - player.h + 10, 20, player.h - 10);

  // White trim at waist and collar
  ctx.fillStyle = '#ccffcc'; ctx.shadowBlur = 0;
  ctx.fillRect(px - 10, py - 16, 20, 2);
  ctx.fillRect(px - 10, py - player.h + 10, 20, 2);

  // GL chest symbol: two concentric circles + crosshair
  const chestY = py - player.h / 2 + 2;
  ctx.shadowBlur = 14; ctx.shadowColor = '#00ff44';
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(px, chestY, 8, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(px, chestY, 4.5, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px - 9, chestY); ctx.lineTo(px + 9, chestY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px, chestY - 9); ctx.lineTo(px, chestY + 9); ctx.stroke();

  // Ring arm (extended rectangle on facing side)
  const ringX = px + fd * 10;
  const ringY = py - player.h * 0.45;
  ctx.fillStyle = '#003318'; ctx.shadowBlur = 4;
  ctx.fillRect(fd > 0 ? px + 9 : px - 19, py - player.h + 14, 10, 8);

  // Ring glow (pulses, brightens when Space held)
  const ringPulse = keys['Space'] ? 1.0 : 0.5 + pulse * 0.35;
  ctx.shadowBlur = 10 + ringPulse * 8; ctx.shadowColor = '#00ff44';
  ctx.strokeStyle = `rgba(0,255,68,${0.6 + ringPulse * 0.4})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(ringX, ringY, 4 + ringPulse * 2, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = `rgba(0,255,68,${0.3 + ringPulse * 0.4})`;
  ctx.beginPath(); ctx.arc(ringX, ringY, 3.5, 0, Math.PI * 2); ctx.fill();

  // Head
  ctx.shadowBlur = 8; ctx.shadowColor = '#00ff44';
  ctx.fillStyle = '#55cc88';
  ctx.beginPath(); ctx.arc(px, py - player.h + 9, 10, 0, Math.PI * 2); ctx.fill();

  // Black domino mask
  ctx.fillStyle = '#001a0a';
  ctx.fillRect(px - 9, py - player.h + 4, 18, 6);

  // White glowing eye slits
  ctx.shadowBlur = 8; ctx.shadowColor = '#aaffcc';
  ctx.fillStyle = '#ccffee';
  ctx.fillRect(px - 7, py - player.h + 5, 5, 3);
  ctx.fillRect(px + 2, py - player.h + 5, 5, 3);

  ctx.restore();
}

// ─── Draw: bullets & particles ────────────────────────────────────────────────
function drawBullets() {
  ctx.save();
  // Player bullets — GL laser beam from ring hand to bullet tip
  const ringSX = sx(player.wx) + player.facing * 12;
  const ringSY = player.y - player.h * 0.45;
  for (const b of pBullets) {
    const bx = sx(b.wx);
    // Outer glow
    ctx.strokeStyle = 'rgba(0,255,68,0.10)';
    ctx.lineWidth = 16; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.moveTo(ringSX, ringSY); ctx.lineTo(bx, b.y); ctx.stroke();
    // Mid glow
    ctx.strokeStyle = 'rgba(0,255,68,0.25)';
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(ringSX, ringSY); ctx.lineTo(bx, b.y); ctx.stroke();
    // Core beam
    ctx.strokeStyle = 'rgba(100,255,160,0.8)';
    ctx.lineWidth = 2.5; ctx.shadowBlur = 8; ctx.shadowColor = '#00ff44';
    ctx.beginPath(); ctx.moveTo(ringSX, ringSY); ctx.lineTo(bx, b.y); ctx.stroke();
    // Tip outer
    ctx.shadowBlur = 12; ctx.shadowColor = '#00ff88';
    ctx.fillStyle = '#ccffee';
    ctx.beginPath(); ctx.arc(bx, b.y, 6, 0, Math.PI * 2); ctx.fill();
    // Tip inner
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(bx, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
  }
  // Enemy bullets
  ctx.shadowBlur = 10;
  for (const b of eBullets) {
    ctx.shadowColor = b.color; ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(sx(b.wx), b.y, 5, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a; ctx.shadowBlur = 6; ctx.shadowColor = p.color; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(sx(p.wx), p.y, p.sz * a, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

// ─── Draw: HUD ────────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 8; ctx.shadowColor = '#00ff44'; ctx.fillStyle = '#00ff44';
  ctx.font = 'bold 15px monospace'; ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 14, 28);

  // Lives as lantern rings
  for (let i = 0; i < 3; i++) {
    const alive = i < player.lives;
    ctx.strokeStyle  = alive ? '#00ff44' : '#0a380a';
    ctx.shadowBlur   = alive ? 10 : 0;
    ctx.lineWidth    = 3;
    ctx.beginPath(); ctx.arc(W - 28 - i * 32, 24, 11, 0, Math.PI * 2); ctx.stroke();
    if (alive) {
      ctx.fillStyle = 'rgba(0,255,68,0.22)';
      ctx.beginPath(); ctx.arc(W - 28 - i * 32, 24, 11, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Progress bar
  const prog = Math.min(1, Math.max(0, (player.wx - 130) / (WORLD_LEN - 130 - 450)));
  ctx.shadowBlur = 5; ctx.shadowColor = '#00ff44';
  ctx.fillStyle = '#111'; ctx.fillRect(W/2 - 115, 12, 230, 8);
  ctx.fillStyle = '#00ff44'; ctx.fillRect(W/2 - 115, 12, 230 * prog, 8);
  ctx.strokeStyle = '#00ff44'; ctx.lineWidth = 1; ctx.strokeRect(W/2 - 115, 12, 230, 8);
  ctx.fillStyle = '#888'; ctx.shadowBlur = 0; ctx.font = '9px monospace'; ctx.textAlign = 'center';
  ctx.fillText('PROGRESS TO PRISONER', W/2, 32);
  ctx.restore();
}

// ─── Screens ──────────────────────────────────────────────────────────────────
function drawMenu() {
  drawBG();
  ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
  glowText('CAVE RESCUE',        W/2, 140, '#00ff44', 58);
  glowText('Green Lantern Edition', W/2, 186, '#44aa77', 19);
  ctx.textAlign = 'center'; ctx.shadowBlur = 0;
  const lines = [
    ['← → Arrow keys : Move',                  '#aaa',   244],
    ['↑ : Jump    ↑↑ double-tap : Double jump', '#aaa',   268],
    ['↓ : Drop through ledge (when on one)',    '#aaa',   292],
    ['SPACE : Shoot ring laser',                '#aaa',   316],
    ['SPACE + ↑ / ↓ : Aim laser up or down',   '#88ffcc',340],
    ['',                                        '',       358],
    ['SNAKE – slow, shoots from mouth',         '#88ff44',378],
    ['DWARF – fast, melee clash damage',        '#ffaa44',406],
    ['BIRD  – flies medium height, shoots',     '#ff8844',434],
    ['3 Lives · Reach the prisoner to WIN',     '#fff',   462],
  ];
  lines.forEach(([t, c, y]) => {
    if (!t) return;
    ctx.fillStyle = c; ctx.font = '13px monospace'; ctx.fillText(t, W/2, y);
  });
  blinkText('CLICK TO START', W/2, H - 8, '#ffffff', 20);
}

function drawGameOver() {
  drawBG(); drawCave(); drawStalactites();
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
  glowText('GAME OVER',     W/2, 200, '#ff2222', 66);
  glowText(`Score: ${score}`, W/2, 275, '#ffffff', 24);
  blinkText('CLICK TO RETRY', W/2, 380, '#ffffff', 20);
}

function drawWin() {
  drawBG(); drawCave(); drawStalactites();
  ctx.fillStyle = 'rgba(0,20,0,0.72)'; ctx.fillRect(0, 0, W, H);
  glowText('PRISONER RESCUED!',     W/2, 185, '#00ff44', 50);
  glowText(`Final Score: ${score}`, W/2, 258, '#ffcc00', 26);
  glowText('You saved the cave!',   W/2, 300, '#88ff88', 18);
  blinkText('CLICK TO PLAY AGAIN',  W/2, 390, '#ffffff', 20);
}

// ─── Click handler ────────────────────────────────────────────────────────────
canvas.addEventListener('click', () => {
  if (gameState !== 'playing') startGame();
});

// ─── Main loop ────────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  ctx.clearRect(0, 0, W, H);

  switch (gameState) {
    case 'menu':     drawMenu();     break;
    case 'gameover': drawGameOver(); break;
    case 'win':      drawWin();      break;
    default:
      update(dt);
      drawBG(); drawCave(); drawStalactites(); drawLedges(); drawHazards();
      drawPrisoner(); drawEnemies(); drawParticles();
      drawPlayer(); drawBullets(); drawHUD();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
