// ─── MISSION HELPERS ──────────────────────────────────────────────────────────
function hasAllCats(c){
  return c.some(i=>i.cat==='food') && c.some(i=>i.cat==='drink') && c.some(i=>i.cat==='dessert');
}
function sumPrice(c){ return c.reduce((s,i)=>s+i.price,0); }
function sumCal(c)  { return c.reduce((s,i)=>s+i.cal,0); }
function calByNutrient(c,n){ return c.filter(i=>i.nutrients.includes(n)).reduce((s,i)=>s+i.cal,0); }

// Each goal: {label, get(c), target, unit, inv (lower=better), bool}
const MISSION_TYPES=[
  {id:'sehat',      title:'🥗 SEHAT & HEMAT',
   desc:'Fiber+Protein, min 500 kal, max Rp 60.000',
   goals:[
     {label:'Kalori',    get:c=>sumCal(c),                                        target:500,   unit:'kal', inv:false},
     {label:'Budget',    get:c=>sumPrice(c),                                      target:60000, unit:'Rp',  inv:true},
     {label:'Ada Fiber', get:c=>c.some(i=>i.nutrients.includes('fiber'))?1:0,    target:1,     unit:'',    bool:true},
     {label:'Ada Protein',get:c=>c.some(i=>i.nutrients.includes('protein'))?1:0, target:1,     unit:'',    bool:true},
   ],
   check:c=>hasAllCats(c)&&sumCal(c)>=500&&sumPrice(c)<=60000&&
            c.some(i=>i.nutrients.includes('fiber'))&&c.some(i=>i.nutrients.includes('protein')),
   ratio:c=>{
     if(!hasAllCats(c))return 0;
     const r1=Math.min(1,sumCal(c)/500);
     const r2=sumPrice(c)<=60000?1:60000/sumPrice(c);
     const r3=c.some(i=>i.nutrients.includes('fiber'))?1:0;
     const r4=c.some(i=>i.nutrients.includes('protein'))?1:0;
     return(r1+r2+r3+r4)/4;
   }},

  {id:'protein_cal',title:'💪 PROTEIN POWER',
   desc:'Capai 1.500 kalori dari makanan PROTEIN!',
   goals:[
     {label:'Kal Protein',get:c=>calByNutrient(c,'protein'),target:1500,unit:'kal',inv:false},
   ],
   check:c=>hasAllCats(c)&&calByNutrient(c,'protein')>=1500,
   ratio:c=>hasAllCats(c)?Math.min(1,calByNutrient(c,'protein')/1500):0},

  {id:'budget',     title:'💰 BUDGET HUNT',
   desc:'Beli banyak, habiskan maks Rp 50.000!',
   goals:[
     {label:'Jumlah item',get:c=>c.length,          target:5,     unit:'item',inv:false},
     {label:'Budget',     get:c=>sumPrice(c),        target:50000, unit:'Rp', inv:true},
   ],
   check:c=>hasAllCats(c)&&sumPrice(c)<=50000,
   ratio:c=>hasAllCats(c)&&sumPrice(c)<=50000?Math.min(1,c.length/5):0},

  {id:'cal_target', title:'🎯 KALORI TEPAT',
   desc:'Capai tepat 1.200 kalori (\u00b1150 kcal)!',
   goals:[
     {label:'Kalori', get:c=>sumCal(c), target:1200, unit:'kal', inv:false, range:{min:1050,max:1350}},
   ],
   check:c=>hasAllCats(c)&&Math.abs(sumCal(c)-1200)<=150,
   ratio:c=>hasAllCats(c)?Math.max(0,1-Math.abs(sumCal(c)-1200)/1200):0},

   ],

   ratio:c=>hasAllCats(c)?Math.min(1,new Set(c.map(i=>i.stallId)).size/4):0},

// Goal progress ratio (0..1)
function goalRatio(g, c){
  const v=g.get(c);
  if(g.bool) return v>=g.target?1:0;
  if(g.range) return Math.max(0,1-Math.abs(v-1200)/1200);
  if(g.inv)   return v<=g.target?1:Math.max(0,g.target/v);
  return Math.min(1,v/g.target);
}

// ─── MARKET LAYOUT ────────────────────────────────────────────────────────────
// 12 stalls on perimeter:
//   4 top  (facing down)   — evenly across top
//   4 left (facing right)  — evenly down left wall
//   4 right(facing left)   — evenly down right wall (same y as left)
// Market floor: x=50 y=HUD_H w=700 h=(H-HUD_H-28)
// Left-col right edge=145, Right-col left edge=655
// Top-row stalls: x=181..529, leaving 36px gap to each wall column
const MY=HUD_H+2;   // market top y
const LY0=MY+80;    // first left/right stall y (below top row + gap)
const LYS=110;      // vertical step between left/right stalls

const STALL_LAYOUT=[
  // ── Top row (4, facing down, y=MY+2) ─────────────────────────────────────
  {x:181,y:MY+2,  w:90,h:55,facing:'down', defIdx:0 },  // nasiuduk
  {x:297,y:MY+2,  w:90,h:55,facing:'down', defIdx:1 },  // ayamandi
  {x:413,y:MY+2,  w:90,h:55,facing:'down', defIdx:2 },  // warteg
  {x:529,y:MY+2,  w:90,h:55,facing:'down', defIdx:3 },  // dimsum

  // ── Left column (4, facing right, x=55) ──────────────────────────────────
  {x:55, y:LY0,      w:90,h:55,facing:'right',defIdx:4 },  // bakso
  {x:55, y:LY0+LYS,  w:90,h:55,facing:'right',defIdx:5 },  // padang
  {x:55, y:LY0+LYS*2,w:90,h:55,facing:'right',defIdx:6 },  // gadogado
  {x:55, y:LY0+LYS*3,w:90,h:55,facing:'right',defIdx:7 },  // sate

  // ── Right column (4, facing left, x=655) ─────────────────────────────────
  {x:655,y:LY0,      w:90,h:55,facing:'left', defIdx:8 },  // kolak (dessert)
  {x:655,y:LY0+LYS,  w:90,h:55,facing:'left', defIdx:9 },  // jus (drink)
  {x:655,y:LY0+LYS*2,w:90,h:55,facing:'left', defIdx:10},  // rumahes (dessert)
  {x:655,y:LY0+LYS*3,w:90,h:55,facing:'left', defIdx:11},  // bebek
];

function generateMarket(){
  stalls=[];
  STALL_LAYOUT.forEach((sl,idx)=>{
    const def=STALL_DEFS[sl.defIdx];
    const qLen=Math.floor(Math.random()*5);
    const qWait=qLen*QUEUE_SEC;

    let ix=sl.x+sl.w/2, iy=sl.y+sl.h/2;
    if(sl.facing==='down')  iy=sl.y+sl.h+12;
    else if(sl.facing==='up')   iy=sl.y-12;
    else if(sl.facing==='left') ix=sl.x-12;
    else                        ix=sl.x+sl.w+12;

    stalls.push({
      defId:def.id, stallIdx:idx,
      x:sl.x,y:sl.y,w:sl.w,h:sl.h,
      facing:sl.facing,
      queueLen:qLen,queueWait:qWait,
      color:def.color,name:def.name,
      cat:def.cat,vendor:def.vendor,
      items:def.items.map(i=>({...i})),
      interactX:ix,interactY:iy,
      counterRect:{x:sl.x,y:sl.y,w:sl.w,h:sl.h},
    });
  });
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
function makePlayer(){
  player={x:400,y:H-55,vx:0,vy:0,w:18,h:24,
    state:'walk',activeStall:null,queueTimer:0,
    animFrame:0,animTimer:0,facing:'up'};
}

// ─── SCORING ──────────────────────────────────────────────────────────────────
function calcScore(){
  const ratio=mission.ratio(cart);
  const base=Math.round(ratio*100);
  const timeBonus=timer>30?20:timer>10?10:0;
  return Math.min(120,base+timeBonus);
}
function randNPC(){
  const u=Math.random()||0.0001,v=Math.random();
  return Math.max(0,Math.min(120,Math.round(62+22*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v))));
}

// ─── GAME START / END ─────────────────────────────────────────────────────────
function startGame(){
  generateMarket();makePlayer();
  mission=MISSION_TYPES[Math.floor(Math.random()*MISSION_TYPES.length)];
  npcScores=NPC_NAMES.map(name=>({name,score:randNPC()}));
  cart=[];timer=TOTAL_TIME;score=0;floatTexts=[];
  activeStall=null;nearStall=null;menuItemIndex=0;
  gameState='playing';
}
function endGame(){ score=calcScore(); gameState='result'; }

// ─── BUY ITEM ─────────────────────────────────────────────────────────────────
function buyItem(item){
  cart.push({...item,stallId:activeStall.defId});
  floatTexts.push({x:player.x,y:player.y-20,text:'+'+item.name,timer:1.6,color:'#ffee44'});
  gameState='playing';player.state='walk';activeStall=null;nearStall=null;
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function aabbCollide(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}
function pushOut(p,r){
  const oL=p.x+p.w-r.x,oR=r.x+r.w-p.x,oT=p.y+p.h-r.y,oB=r.y+r.h-p.y;
  const mx=Math.min(oL,oR),my=Math.min(oT,oB);
  if(mx<my){if(oL<oR)p.x-=oL;else p.x+=oR;}
  else{if(oT<oB)p.y-=oT;else p.y+=oB;}
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update(dt){
  if(gameState==='playing'||gameState==='queueing'||gameState==='shopping'){
    timer-=dt;
    if(timer<=0){timer=0;endGame();return;}
  }

  floatTexts.forEach(ft=>{ft.timer-=dt;ft.y-=30*dt;});
  floatTexts=floatTexts.filter(ft=>ft.timer>0);

  if(player.state==='queue'){
    player.queueTimer-=dt;
    if(player.queueTimer<=0){
      player.queueTimer=0;gameState='shopping';player.state='shop';menuItemIndex=0;
    }
    return;
  }
  if(player.state==='shop')return;

  let vx=0,vy=0;
  if(keys['ArrowUp']  ||keys['w']||keys['W']||mobileKeys.up)    vy=-PSPEED;
  if(keys['ArrowDown']||keys['s']||keys['S']||mobileKeys.down)  vy= PSPEED;
  if(keys['ArrowLeft']||keys['a']||keys['A']||mobileKeys.left)  vx=-PSPEED;
  if(keys['ArrowRight']||keys['d']||keys['D']||mobileKeys.right)vx= PSPEED;
  if(vx&&vy){vx*=0.707;vy*=0.707;}

  player.x+=vx*dt; player.y+=vy*dt;
  if(vx<0)player.facing='left';
  else if(vx>0)player.facing='right';
  else if(vy<0)player.facing='up';
  else if(vy>0)player.facing='down';

  if(vx||vy){
    player.animTimer+=dt;
    if(player.animTimer>0.18){player.animTimer=0;player.animFrame^=1;}
  } else player.animFrame=0;

  const PAD=4;
  stalls.forEach(s=>{
    const r={x:s.counterRect.x-PAD,y:s.counterRect.y-PAD,
             w:s.counterRect.w+PAD*2,h:s.counterRect.h+PAD*2};
    if(aabbCollide(player.x,player.y,player.w,player.h,r.x,r.y,r.w,r.h))
      pushOut(player,r);
  });

  // Clamp to market
  player.x=Math.max(52,Math.min(748-player.w,player.x));
  player.y=Math.max(HUD_H+2,Math.min(H-28-player.h,player.y));

  // Nearest stall
  let best=null,bestD=52;
  stalls.forEach(s=>{
    const dx=player.x+9-s.interactX,dy=player.y+12-s.interactY;
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestD){bestD=d;best=s;}
  });
  nearStall=best;
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(gameState==='menu'){if(e.key===' '||e.key==='Enter')startGame();return;}
  if(gameState==='result'){if(e.key===' '||e.key==='Enter')gameState='ranking';return;}
  if(gameState==='ranking'){if(e.key===' '||e.key==='Enter')gameState='menu';return;}

  if(gameState==='playing'&&player.state==='walk'){
    if(e.key===' '&&nearStall){
      e.preventDefault();
      activateStall(nearStall);
    }
  }
  if(gameState==='shopping'||player&&player.state==='shop'){
    if(e.key==='ArrowUp'){e.preventDefault();menuItemIndex=Math.max(0,menuItemIndex-1);}
    if(e.key==='ArrowDown'){e.preventDefault();
      menuItemIndex=Math.min(activeStall.items.length-1,menuItemIndex+1);}
    if(e.key===' '){e.preventDefault();if(activeStall)buyItem(activeStall.items[menuItemIndex]);}
    if(e.key==='Escape'){gameState='playing';player.state='walk';activeStall=null;nearStall=null;}
  }
  if(e.key===' ')e.preventDefault();
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function activateStall(s){
  player.state='queue';player.activeStall=s;activeStall=s;
  player.queueTimer=s.queueWait;
  player.x=s.interactX-9;player.y=s.interactY+2;
  gameState=s.queueWait>0?'queueing':'shopping';
  if(gameState==='shopping'){player.state='shop';menuItemIndex=0;}
}

// ─── MOUSE ────────────────────────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  if(gameState==='menu'){startGame();return;}
  if(gameState==='result'){gameState='ranking';return;}
  if(gameState==='ranking'){
    const r=canvas.getBoundingClientRect();
    const cx=(e.clientX-r.left)*(W/r.width),cy=(e.clientY-r.top)*(H/r.height);
    if(cx>=W/2-90&&cx<=W/2+90&&cy>=H-80&&cy<=H-40)gameState='menu';
    return;
  }
  if(gameState==='shopping'){
    const r=canvas.getBoundingClientRect();
    const cx=(e.clientX-r.left)*(W/r.width),cy=(e.clientY-r.top)*(H/r.height);
    const px=W/2-170,py=H/2-140;
    if(cx<px||cx>px+340||cy<py||cy>py+280){
      gameState='playing';player.state='walk';activeStall=null;nearStall=null;
    }
  }
});

// ─── TOUCH / MOBILE ───────────────────────────────────────────────────────────
const DPAD_CX=75,DPAD_CY=H-100,DPAD_R=55;
const BUY_CX=700,BUY_CY=H-90,BUY_R=38;  // right of market, left of cart

function hitDpad(tx,ty){
  const dx=tx-DPAD_CX,dy=ty-DPAD_CY;
  if(Math.sqrt(dx*dx+dy*dy)>DPAD_R+10)return null;
  const a=Math.atan2(dy,dx)*180/Math.PI;
  if(a>=-45&&a<45)return 'right';
  if(a>=45&&a<135)return 'down';
  if(a>=-135&&a<-45)return 'up';
  return 'left';
}
function processTouches(e){
  e.preventDefault();
  mobileKeys={up:false,down:false,left:false,right:false,buy:false};
  for(let t of e.touches){
    const r=canvas.getBoundingClientRect();
    const tx=(t.clientX-r.left)*(W/r.width),ty=(t.clientY-r.top)*(H/r.height);
    const dir=hitDpad(tx,ty);if(dir)mobileKeys[dir]=true;
    const bDx=tx-BUY_CX,bDy=ty-BUY_CY;
    if(Math.sqrt(bDx*bDx+bDy*bDy)<BUY_R)mobileKeys.buy=true;
  }
}
canvas.addEventListener('touchstart',e=>{
  processTouches(e);
  if(gameState==='menu'){startGame();return;}
  if(gameState==='result'){gameState='ranking';return;}
  if(gameState==='ranking'){gameState='menu';return;}
  if(mobileKeys.buy){
    if(gameState==='playing'&&player&&player.state==='walk'&&nearStall)activateStall(nearStall);
    else if(gameState==='shopping'&&player&&player.state==='shop'&&activeStall)
      buyItem(activeStall.items[menuItemIndex]);
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>processTouches(e),{passive:false});
canvas.addEventListener('touchend',e=>processTouches(e),{passive:false});

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function rp(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function fmt(n){return 'Rp '+n.toLocaleString('id-ID');}
function lighten(hex,p){
  let r=parseInt(hex.slice(1,3),16)+p,g=parseInt(hex.slice(3,5),16)+p,b=parseInt(hex.slice(5,7),16)+p;
  return '#'+[Math.min(255,r),Math.min(255,g),Math.min(255,b)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ─── DRAW BG ─────────────────────────────────────────────────────────────────
function drawBG(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a2e');grad.addColorStop(0.5,'#8b3a10');grad.addColorStop(1,'#c85a20');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Market floor
  ctx.fillStyle='#c8a060';
  ctx.fillRect(50,HUD_H,700,H-HUD_H-20);

  // Walls
  ctx.fillStyle='#3a2010';
  ctx.fillRect(35,HUD_H-5,725,10);     // top wall
  ctx.fillRect(35,H-22,725,10);        // bottom wall
  ctx.fillRect(35,HUD_H-5,12,H-HUD_H); // left
  ctx.fillRect(752,HUD_H-5,12,H-HUD_H);// right

  // Entry arrow
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();ctx.moveTo(400,H-4);ctx.lineTo(390,H-18);ctx.lineTo(410,H-18);ctx.closePath();ctx.fill();
  ctx.fillRect(397,H-30,6,14);

  // Lanterns
  const lc=['#ff6600','#ffcc00','#ff3366','#00ccff','#ff6600'];
  for(let i=0;i<5;i++){
    const lx=90+i*140,ly=HUD_H+12;
    if(i<4){ctx.strokeStyle='#5a4020';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+140,ly);ctx.stroke();}
    ctx.fillStyle=lc[i];
    ctx.beginPath();ctx.ellipse(lx,ly+5,5,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.25)';
    ctx.beginPath();ctx.ellipse(lx,ly+5,10,14,0,0,Math.PI*2);ctx.fill();
  }
}

// ─── DRAW STALL ──────────────────────────────────────────────────────────────
function drawStall(s){
  const isNear=nearStall===s;
  if(isNear){ctx.save();ctx.shadowColor='#ffff00';ctx.shadowBlur=22;}

  // Awning
  ctx.fillStyle=s.color;
  rp(s.x,s.y,s.w,s.h,6);ctx.fill();

  // Category color border (thick)
  ctx.strokeStyle=CAT_COL[s.cat];ctx.lineWidth=3;
  rp(s.x,s.y,s.w,s.h,6);ctx.stroke();

  // Scallop
  const scW=12;
  ctx.fillStyle=lighten(s.color,25);
  for(let sx=s.x;sx<s.x+s.w-scW/2;sx+=scW){
    ctx.beginPath();ctx.arc(sx+scW/2,s.y+s.h,scW/2,0,Math.PI);ctx.fill();
  }

  // Counter
  ctx.fillStyle='#3d1a00';
  if(s.facing==='down')      ctx.fillRect(s.x,s.y+s.h-6,s.w,12);
  else if(s.facing==='up')   ctx.fillRect(s.x,s.y-6,s.w,12);
  else if(s.facing==='left') ctx.fillRect(s.x-6,s.y,12,s.h);
  else                       ctx.fillRect(s.x+s.w-6,s.y,12,s.h);

  if(isNear)ctx.restore();

  // Dark name band at top of awning — keeps name clearly visible
  ctx.fillStyle='rgba(0,0,0,0.52)';
  ctx.fillRect(s.x+2,s.y+2,s.w-4,26);

  // Stall name (two lines if needed)
  ctx.fillStyle='#fff';
  ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  const name=s.name;
  if(name.length>12){
    const sp=name.lastIndexOf(' ',Math.floor(name.length/2)+2);
    const l1=sp>0?name.slice(0,sp):name.slice(0,10);
    const l2=sp>0?name.slice(sp+1):name.slice(10);
    ctx.fillText(l1,s.x+s.w/2,s.y+12);
    ctx.fillText(l2,s.x+s.w/2,s.y+22);
  } else {
    ctx.fillText(name,s.x+s.w/2,s.y+16);
  }

  // Queue display (directly at counter face)
  drawQueueDots(s);

  // Vendor figure
  drawVendor(s);

  // Equipment
  drawEquipment(s);

  // SPACE prompt
  if(isNear&&gameState==='playing'&&player.state==='walk'){
    ctx.save();ctx.shadowColor='#ffff00';ctx.shadowBlur=10;
    ctx.fillStyle='#ffee44';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(isMobile?'BELI':'SPACE',s.x+s.w/2,s.y-5);
    ctx.restore();
  }
}

// Queue dots: compact, directly at counter front, show number badge
function drawQueueDots(s){
  const q=s.queueLen;
  if(!q)return;

  // Position: right at the interact point (counter face)
  const ix=s.interactX, iy=s.interactY;

  // Draw up to 3 small person icons in a tight cluster
  const show=Math.min(q,3);
  for(let i=0;i<show;i++){
    let px=ix,py=iy;
    if(s.facing==='down')     {px=ix-10+(i*10);py=iy+4;}
    else if(s.facing==='up')  {px=ix-10+(i*10);py=iy-4;}
    else if(s.facing==='left'){px=ix-4;py=iy-8+(i*8);}
    else                      {px=ix+4;py=iy-8+(i*8);}

    ctx.fillStyle='#e8b490';
    ctx.beginPath();ctx.arc(px,py-4,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6688bb';
    ctx.fillRect(px-2,py-1,5,6);
  }

  // Number badge right at interact point
  const bx=ix+4, by=iy-14;
  ctx.fillStyle=q>3?'#dd2200':q>1?'#cc7700':'#448800';
  rp(bx-1,by-9,18,13,4);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='left';
  ctx.fillText(q+'x',bx+1,by);

  // Wait time
  if(s.queueWait>0){
    ctx.fillStyle=s.queueWait>6?'#ff4400':'#ffaa00';
    ctx.font='8px sans-serif';ctx.textAlign='center';
    ctx.fillText(s.queueWait+'s',ix,iy+(s.facing==='down'?22:s.facing==='up'?-16:8));
  }
}

function drawVendor(s){
  const cx=s.x+s.w/2,cy=s.y+s.h*0.78;  // shifted to bottom 2/3 of awning
  if(s.vendor==='woman'){
    ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.ellipse(cx,cy-8,8,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8b490';ctx.beginPath();ctx.arc(cx,cy-8,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a1a60';ctx.beginPath();ctx.ellipse(cx,cy-4,11,10,0,0,Math.PI);ctx.fill();
    ctx.fillStyle='#cc4466';ctx.fillRect(cx-7,cy,14,13);
    ctx.fillStyle='#fff';ctx.fillRect(cx-4,cy+2,8,9);
  } else {
    ctx.fillStyle='#fff';ctx.fillRect(cx-7,cy-16,14,5);
    ctx.fillStyle='#e8b490';ctx.beginPath();ctx.arc(cx,cy-8,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#336699';ctx.fillRect(cx-7,cy,14,13);
    ctx.fillStyle='#fff';ctx.fillRect(cx-4,cy+2,8,9);
  }
}

function drawEquipment(s){
  const cx=s.x+s.w/2,cy=s.y+s.h*0.72;  // shifted to bottom half of awning
  const id=s.defId;
  if(id==='nasiuduk'||id==='warteg'){
    ctx.fillStyle='rgba(255,220,80,0.5)';ctx.beginPath();ctx.ellipse(cx,cy+4,10,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a3a10';ctx.beginPath();ctx.ellipse(cx,cy,9,5,0,0,Math.PI*2);ctx.fill();
  } else if(id==='ayamandi'||id==='bebek'){
    ctx.fillStyle='rgba(255,100,0,0.7)';ctx.beginPath();ctx.ellipse(cx,cy+5,8,4,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(cx,cy+2,12,4,0,0,Math.PI*2);ctx.fill();
  } else if(id==='bakso'||id==='padang'){
    ctx.fillStyle='rgba(80,140,255,0.6)';ctx.beginPath();ctx.ellipse(cx,cy+5,6,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4a3010';ctx.beginPath();ctx.ellipse(cx,cy,10,7,0,0,Math.PI*2);ctx.fill();
  } else if(id==='dimsum'||id==='sate'){
    ctx.fillStyle='#8a6020';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.ellipse(cx-8+i*8,cy+4,5,3,0,0,Math.PI*2);ctx.fill();}
  } else if(id==='gadogado'||id==='warteg'){
    ctx.fillStyle='#3a8a10';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(cx-6+i*6,cy+3,4,0,Math.PI*2);ctx.fill();}
  } else if(id==='jus'){
    ctx.fillStyle='#7a99bb';ctx.fillRect(cx-8,cy-10,16,20);
    ctx.fillStyle='#aaccee';ctx.fillRect(cx-6,cy-8,12,4);
  } else if(id==='kolak'||id==='rumahes'){
    const bc=['#ff6600','#6699ff','#66cc44'];
    for(let i=0;i<3;i++){ctx.fillStyle=bc[i];ctx.beginPath();ctx.ellipse(cx-8+i*8,cy+4,5,3,0,0,Math.PI*2);ctx.fill();}
  }
}

function drawMarket(){

// ─── DRAW PLAYER ─────────────────────────────────────────────────────────────
function drawPlayer(){
  if(!player)return;
  const px=Math.round(player.x),py=Math.round(player.y);
  const af=player.animFrame;
  const flip=player.facing==='left';

  ctx.save();
  if(flip){ctx.scale(-1,1);ctx.translate(-px*2-player.w,0);}

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(px+9,py+player.h,7,3,0,0,Math.PI*2);ctx.fill();

  const legOff=af?2:-2;
  // Shorts
  ctx.fillStyle='#8844cc';ctx.fillRect(px+2,py+14,6,7);ctx.fillRect(px+10,py+14,6,7);
  // Skin legs
  ctx.fillStyle='#e8b490';ctx.fillRect(px+2,py+20,6,6);ctx.fillRect(px+10,py+20,6,6);
  // Sandals
  ctx.fillStyle='#4a2800';
  ctx.beginPath();ctx.ellipse(px+5+legOff,py+26,5,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(px+13-legOff,py+26,5,2,0,0,Math.PI*2);ctx.fill();
  // T-shirt
  ctx.fillStyle='#4488cc';ctx.fillRect(px+1,py+6,16,12);
  // Arms
  ctx.fillStyle='#e8b490';
  ctx.fillRect(px-2,py+8+(af?2:-2),4,8);
  ctx.fillRect(px+16,py+8+(af?-2:2),4,8);
  // Head
  ctx.fillStyle='#e8b490';ctx.beginPath();ctx.arc(px+9,py+4,7,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#2a1a08';ctx.beginPath();ctx.arc(px+9,py+4,7,Math.PI,0);ctx.fill();
  // Eyes
  ctx.fillStyle='#1a0800';ctx.fillRect(px+6,py+4,2,2);ctx.fillRect(px+11,py+4,2,2);
  ctx.restore();
}

// ─── DRAW QUEUE BAR ───────────────────────────────────────────────────────────
function drawQueueBar(){
  if(!activeStall||!player)return;
  const maxW=activeStall.queueWait||1;
  const ratio=1-(player.queueTimer/maxW);
  const bx=activeStall.x,by=activeStall.y-26,bw=activeStall.w,bh=14;
  ctx.fillStyle='rgba(0,0,0,0.8)';rp(bx,by,bw,bh,4);ctx.fill();
  ctx.fillStyle='#ffd700';rp(bx+1,by+1,Math.max(0,(bw-2)*ratio),bh-2,3);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
  ctx.fillText('Antri... '+Math.ceil(player.queueTimer)+'s',bx+bw/2,by+10);
}

// ─── DRAW MISSION BAR (PROMINENT) ────────────────────────────────────────────
function drawMissionBar(){
  if(!mission)return;

  // Background
  ctx.fillStyle='rgba(8,0,18,0.92)';
  ctx.fillRect(0,0,W,HUD_H);
  // Bottom glow line
  ctx.fillStyle=mission.id==='sehat'?'#44aa44':mission.id==='protein_cal'?'#4466ff':
                mission.id==='budget'?'#ffcc00':mission.id==='cal_target'?'#ff8800':'#aa44ff';
  ctx.fillRect(0,HUD_H-2,W,2);

  // ── MISSION TITLE (large, prominent) ──
  ctx.save();
  ctx.shadowColor='#ffd700';ctx.shadowBlur=18;
  ctx.fillStyle='#ffd700';ctx.font='bold 22px sans-serif';ctx.textAlign='left';
  ctx.fillText(mission.title,8,26);
  ctx.restore();

  ctx.fillStyle='#eeeeee';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText(mission.desc,8,44);

  // ── CATEGORY CHECKS ──
  const hasFood=cart.some(i=>i.cat==='food');
  const hasDrink=cart.some(i=>i.cat==='drink');
  const hasDessert=cart.some(i=>i.cat==='dessert');
  const cats=[{l:'Makanan',ok:hasFood,c:CAT_COL.food},{l:'Minuman',ok:hasDrink,c:CAT_COL.drink},{l:'Dessert',ok:hasDessert,c:CAT_COL.dessert}];
  cats.forEach((c,i)=>{
    const cx=10+i*90;
    ctx.fillStyle=c.ok?c.c:'rgba(255,255,255,0.18)';
    rp(cx,HUD_H-30,82,22,4);ctx.fill();
    ctx.fillStyle=c.ok?'#fff':'#888';ctx.font=(c.ok?'bold ':'')+'10px sans-serif';ctx.textAlign='center';
    ctx.fillText((c.ok?'✓ ':'')+c.l,cx+41,HUD_H-15);
  });

  // ── GOAL PROGRESS BARS (right section) ──
  const goals=mission.goals;
  const bStartX=W-340, bEndX=W-110;
  const bW=bEndX-bStartX;
  goals.forEach((g,i)=>{
    const rowY=6+i*22;
    const val=g.get(cart);
    const r=goalRatio(g,cart);
    const done=r>=1;

    // Label
    ctx.fillStyle=done?'#44ff88':'#cccccc';
    ctx.font=(done?'bold ':'')+'10px sans-serif';ctx.textAlign='right';
    const dispVal=g.unit==='Rp'?fmt(val):val+(g.unit?(' '+g.unit):'');
    const dispTarget=g.unit==='Rp'?fmt(g.target):g.target+(g.unit?(' '+g.unit):'');
    const labelTxt=g.bool?(val?'✓ '+g.label:'✗ '+g.label):g.label+': '+dispVal+' / '+dispTarget;
    ctx.fillText(labelTxt,bStartX-4,rowY+12);

    // Bar track
    ctx.fillStyle='rgba(255,255,255,0.12)';
    rp(bStartX,rowY+2,bW,14,3);ctx.fill();

    // Bar fill
    const fillColor=done?'#44ff88':r>0.6?'#ffd700':r>0.3?'#ff9900':'#ff4444';
    ctx.fillStyle=fillColor;
    rp(bStartX,rowY+2,Math.max(4,bW*Math.min(1,r)),14,3);ctx.fill();

    // Percentage text
    ctx.fillStyle=done?'#003300':'#000';
    ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText(Math.round(r*100)+'%',bStartX+bW*Math.min(1,r)/2+2,rowY+12);
  });

  // ── TIMER (large, right) ──
  const pulse=timer<10&&blinkOn;
  ctx.save();
  if(pulse){ctx.shadowColor='#ff2200';ctx.shadowBlur=25;}
  ctx.fillStyle=timer<10?'#ff4400':timer<20?'#ffaa00':'#ffffff';
  ctx.font='bold 38px sans-serif';ctx.textAlign='center';
  ctx.fillText(Math.ceil(timer),W-52,52);
  ctx.restore();
  ctx.fillStyle='#888888';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('detik',W-52,70);

  // ── LEGEND (small) ──
  const cats2=[['food','Makanan'],['drink','Minuman'],['dessert','Dessert']];
  cats2.forEach(([cat,lbl],i)=>{
    const lx=W-105+i*35,ly=HUD_H-26;
    ctx.fillStyle=CAT_COL[cat];
    ctx.fillRect(lx,ly,12,12);
    ctx.fillStyle='#aaa';ctx.font='8px sans-serif';ctx.textAlign='left';
    // just color square; label shown in category checks above
  });
}

  ctx.fillStyle='#ffaa44';ctx.fillText(sumCal(cart)+' kcal',sx+sw-4,by2+26);
}

function drawMobileControls(){
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.arc(DPAD_CX,DPAD_CY,DPAD_R+8,0,Math.PI*2);ctx.fill();
  const arrows=[{k:'up',a:-Math.PI/2,dx:0,dy:-30},{k:'down',a:Math.PI/2,dx:0,dy:30},
                {k:'left',a:Math.PI,dx:-30,dy:0},{k:'right',a:0,dx:30,dy:0}];
  arrows.forEach(a=>{
    ctx.save();ctx.translate(DPAD_CX+a.dx,DPAD_CY+a.dy);ctx.rotate(a.a);
    ctx.fillStyle=mobileKeys[a.k]?'#ffd700':'rgba(255,255,255,0.7)';
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(10,4);ctx.lineTo(-10,4);ctx.closePath();ctx.fill();
    ctx.restore();
  });
  const active=(nearStall&&gameState==='playing'&&player&&player.state==='walk')||
               (gameState==='shopping'&&player&&player.state==='shop');
  ctx.save();
  if(active){ctx.shadowColor='#44ff44';ctx.shadowBlur=18;}
  ctx.fillStyle=mobileKeys.buy?'#ffd700':'rgba(255,200,0,0.85)';
  ctx.beginPath();ctx.arc(BUY_CX,BUY_CY,BUY_R,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a0a00';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText('BELI',BUY_CX,BUY_CY+5);ctx.restore();
}

// ─── DRAW MENU ────────────────────────────────────────────────────────────────
function drawMenu(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a0a2e');grad.addColorStop(0.5,'#8b3a10');grad.addColorStop(1,'#c85a20');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  for(let i=0;i<6;i++){
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(50+i*120,H-120,80,80);
    ctx.beginPath();ctx.moveTo(40+i*120,H-120);ctx.lineTo(90+i*120,H-175);ctx.lineTo(140+i*120,H-120);ctx.closePath();ctx.fill();
  }
  const lc=['#ff6600','#ffcc00','#ff3366','#00ccff','#ff6600'];
  for(let i=0;i<5;i++){
    const lx=80+i*140,ly=50;
    ctx.strokeStyle='#5a4020';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(lx-60,ly);ctx.lineTo(lx+80,ly);ctx.stroke();
    ctx.fillStyle=lc[i];ctx.beginPath();ctx.ellipse(lx,ly+8,7,12,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,200,0,0.3)';ctx.beginPath();ctx.ellipse(lx,ly+8,14,18,0,0,Math.PI*2);ctx.fill();
  }

  ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=30;
  ctx.fillStyle='#ffd700';ctx.font='bold 64px sans-serif';ctx.textAlign='center';
  ctx.fillText('TAKJIL WAR',W/2,160);ctx.restore();

  ctx.fillStyle='#ffcc88';ctx.font='20px sans-serif';ctx.textAlign='center';
  ctx.fillText('Beli Makan Sebelum Buka Puasa!',W/2,195);

  const prev=MISSION_TYPES[Math.floor((Date.now()/3000)%MISSION_TYPES.length)];
  ctx.fillStyle='rgba(0,0,0,0.5)';rp(W/2-200,218,400,80,8);ctx.fill();
  ctx.strokeStyle='#ffd700';ctx.lineWidth=1;rp(W/2-200,218,400,80,8);ctx.stroke();
  ctx.fillStyle='#ffd700';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText('Contoh Misi: '+prev.title,W/2,242);
  ctx.fillStyle='#ccccff';ctx.font='12px sans-serif';ctx.fillText(prev.desc,W/2,262);
  ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.fillText('(misi dipilih acak setiap permainan)',W/2,280);

  // Legend
  ctx.fillStyle='rgba(0,0,0,0.5)';rp(W/2-200,300,400,48,8);ctx.fill();
  ctx.fillStyle='#ccc';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('Warna Warung:',W/2,320);
  const leg=[['food','Makanan'],['drink','Minuman'],['dessert','Dessert']];
  leg.forEach(([c,l],i)=>{
    const lx=W/2-90+i*90;
    ctx.fillStyle=CAT_COL[c];ctx.fillRect(lx-10,325,14,14);
    ctx.fillStyle='#ddd';ctx.font='10px sans-serif';ctx.textAlign='left';ctx.fillText(l,lx+6,337);
  });

  ctx.fillStyle='rgba(0,0,0,0.4)';rp(W/2-200,356,400,80,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('Kontrol',W/2,376);
  ctx.fillStyle='#ccc';ctx.font='11px sans-serif';
  ctx.fillText('Keyboard: Arrow Keys  •  SPACE antri/beli  •  ESC tutup',W/2,396);
  ctx.fillText('Mobile: D-pad kiri  •  Tombol BELI kanan  •  60 detik',W/2,414);

  ctx.fillStyle='rgba(0,0,0,0.4)';rp(W/2-200,442,400,44,8);ctx.fill();
  ctx.fillStyle='#ffaaaa';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Harus beli: Makanan + Minuman + Dessert',W/2,462);
  ctx.fillStyle='#aaffaa';ctx.fillText('1 orang antrian = 3 detik  •  Waktu: 60 detik',W/2,478);

  if(blinkOn){
    ctx.save();ctx.shadowColor='#fff';ctx.shadowBlur=10;
    ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
    ctx.fillText('KLIK / SPACE UNTUK MULAI',W/2,520);ctx.restore();
  }
  if(isMobile)drawMobileControls();
}

// ─── DRAW RESULT ─────────────────────────────────────────────────────────────
function drawResult(){
  ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);
  ctx.save();
  if(score>=80){ctx.shadowColor='#ffd700';ctx.shadowBlur=30;}
  ctx.fillStyle=score>=80?'#ffd700':score>=50?'#88ddff':'#ff6666';
  ctx.font='bold 80px sans-serif';ctx.textAlign='center';ctx.fillText(score,W/2,185);ctx.restore();
  ctx.fillStyle='#fff';ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.fillText('/ 120 POIN',W/2,215);

  const passed=mission.check(cart);
  ctx.fillStyle=passed?'#44ff44':'#ff4444';ctx.font='bold 16px sans-serif';
  ctx.fillText(passed?'✓ Misi Tercapai!':'✗ Misi Gagal',W/2,248);

  // Goal breakdown
  mission.goals.forEach((g,i)=>{
    const r=goalRatio(g,cart);
    const done=r>=1;
    ctx.fillStyle=done?'#44ff88':'#ff6666';
    ctx.font='12px sans-serif';ctx.textAlign='center';
    const v=g.get(cart);
    const disp=g.bool?(v?'✓':'\u2717'):g.label+': '+(g.unit==='Rp'?fmt(v):v+(g.unit?' '+g.unit:''))+' / '+(g.unit==='Rp'?fmt(g.target):g.target+(g.unit?' '+g.unit:''));
    ctx.fillText(disp,W/2-100+i*100,272);
  });

  // Cat checks
  const hf=cart.some(i=>i.cat==='food'),hd=cart.some(i=>i.cat==='drink'),hde=cart.some(i=>i.cat==='dessert');
  [{l:'Makanan',ok:hf},{l:'Minuman',ok:hd},{l:'Dessert',ok:hde}].forEach((c,i)=>{
    ctx.fillStyle=c.ok?'#44ff44':'#ff4444';ctx.font='13px sans-serif';ctx.textAlign='center';
    ctx.fillText((c.ok?'✓':'✗')+' '+c.l,W/2-80+i*80,300);
  });

  ctx.fillStyle='#aaaaff';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('Total: '+sumCal(cart)+' kcal  •  '+fmt(sumPrice(cart))+'  •  '+cart.length+' item',W/2,325);
  ctx.fillText('Sisa waktu: '+Math.ceil(timer)+'s  •  '+mission.title,W/2,345);

  // Items bought
  ctx.fillStyle='rgba(255,255,255,0.08)';rp(W/2-220,360,440,110,6);ctx.fill();
  ctx.fillStyle='#ffd700';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('Yang dibeli:',W/2,378);
  cart.slice(0,9).forEach((item,i)=>{
    const col=i%3,row=Math.floor(i/3);
    ctx.fillStyle=CAT_COL[item.cat]||'#aaa';ctx.font='10px sans-serif';ctx.textAlign='left';
    const nm=item.name.length>16?item.name.slice(0,15)+'…':item.name;
    ctx.fillText(nm,W/2-155+col*150,396+row*20);
  });

  if(blinkOn){ctx.fillStyle='#fff';ctx.font='bold 15px sans-serif';ctx.textAlign='center';ctx.fillText('Klik / SPACE untuk lihat ranking \u2192',W/2,500);}
  if(isMobile)drawMobileControls();
}

// ─── DRAW RANKING ─────────────────────────────────────────────────────────────
function drawRanking(){
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText('🏆 PAPAN SKOR — '+mission.title,W/2,45);

  const entries=[{name:'KAMU',score,isPlayer:true},...npcScores].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'],tw=520,th=42,tx=W/2-260,ty=65;

  entries.forEach((e,i)=>{
    const ey=ty+i*(th+4);
    if(e.isPlayer){ctx.fillStyle='rgba(255,215,0,0.15)';rp(tx,ey,tw,th,6);ctx.fill();
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;rp(tx,ey,tw,th,6);ctx.stroke();}
    else{ctx.fillStyle='rgba(255,255,255,0.04)';rp(tx,ey,tw,th,6);ctx.fill();}
    ctx.font='20px sans-serif';ctx.textAlign='left';
    ctx.fillText(i<3?medals[i]:(i+1)+'.',tx+8,ey+28);
    ctx.fillStyle=e.isPlayer?'#ffd700':'#fff';
    ctx.font=e.isPlayer?'bold 16px sans-serif':'14px sans-serif';
    ctx.fillText(e.name+(e.isPlayer?' ◄':''),tx+52,ey+26);
    const bx=tx+220,bw=tw-240,bh=14;
    ctx.fillStyle='rgba(255,255,255,0.1)';rp(bx,ey+14,bw,bh,4);ctx.fill();
    const sr=e.score/120,bc=e.score>=80?'#ffd700':e.score>=50?'#44aaff':'#ff6644';
    ctx.fillStyle=bc;rp(bx,ey+14,Math.max(0,bw*sr),bh,4);ctx.fill();
    ctx.fillStyle=e.isPlayer?'#ffd700':'#fff';ctx.font='bold 15px sans-serif';ctx.textAlign='right';
    ctx.fillText(e.score+' poin',tx+tw-6,ey+26);
  });

  const rank=entries.findIndex(e=>e.isPlayer)+1;
  ctx.fillStyle='#aaffaa';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('Kamu peringkat ke-'+rank+' dari '+entries.length+' peserta!',W/2,ty+entries.length*(th+4)+20);

  ctx.fillStyle='#ffd700';rp(W/2-90,H-80,180,40,8);ctx.fill();
  ctx.fillStyle='#1a0a00';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
  ctx.fillText('\u25b6 Main Lagi',W/2,H-53);
  if(isMobile)drawMobileControls();
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTime=0;
function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;

  blinkTimer+=dt;if(blinkTimer>0.5){blinkTimer=0;blinkOn=!blinkOn;}
  ctx.clearRect(0,0,W,H);

  switch(gameState){
    case 'menu': drawMenu(); break;
    case 'playing':case 'queueing':case 'shopping':
      update(dt);
      drawBG();drawMarket();drawFloatTexts();drawPlayer();drawHUD();
      if(gameState==='queueing')drawQueueBar();
      if(gameState==='shopping')drawShoppingMenu();
      if(isMobile)drawMobileControls();
      break;
    case 'result':  drawResult();  break;
    case 'ranking': drawRanking(); break;
  }
  requestAnimationFrame(loop);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
generateMarket();
requestAnimationFrame(ts=>{lastTime=ts;loop(ts);});
</script>
