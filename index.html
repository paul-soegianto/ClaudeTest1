<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1em;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      font-weight: bold;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.05em;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
    }

    .score-label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
    .score-val   { font-size: 1.5rem; font-weight: bold; }
    .score-val.x { color: #e94560; }
    .score-val.o { color: #a8dadc; }
    .score-val.d { color: #888; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="scores">
  <div class="score-box">
    <span class="score-label">X Wins</span>
    <span class="score-val x" id="score-x">0</span>
  </div>
  <div class="score-box">
    <span class="score-label">Draws</span>
    <span class="score-val d" id="score-d">0</span>
  </div>
  <div class="score-box">
    <span class="score-label">O Wins</span>
    <span class="score-val o" id="score-o">0</span>
  </div>
</div>

<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="restart">New Game</button>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6],          // diagonals
  ];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  const scores = { X: 0, O: 0, D: 0 };

  const cells   = document.querySelectorAll('.cell');
  const status  = document.getElementById('status');
  const scoreX  = document.getElementById('score-x');
  const scoreO  = document.getElementById('score-o');
  const scoreD  = document.getElementById('score-d');

  cells.forEach(cell => cell.addEventListener('click', () => {
    const i = +cell.dataset.i;
    if (gameOver || board[i]) return;

    board[i] = current;
    cell.textContent = current;
    cell.classList.add(current.toLowerCase(), 'taken');

    const winLine = checkWin();
    if (winLine) {
      winLine.forEach(idx => cells[idx].classList.add('win'));
      status.textContent = `Player ${current} wins! 🎉`;
      scores[current]++;
      updateScores();
      gameOver = true;
    } else if (board.every(Boolean)) {
      status.textContent = "It's a draw!";
      scores.D++;
      updateScores();
      gameOver = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `Player ${current}'s turn`;
    }
  }));

  document.getElementById('restart').addEventListener('click', reset);

  function checkWin() {
    return WINS.find(([a,b,c]) =>
      board[a] && board[a] === board[b] && board[a] === board[c]
    ) || null;
  }

  function updateScores() {
    scoreX.textContent = scores.X;
    scoreO.textContent = scores.O;
    scoreD.textContent = scores.D;
  }

  function reset() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    status.textContent = "Player X's turn";
    cells.forEach(cell => {
      cell.textContent = '';
      cell.className = 'cell';
    });
  }
</script>

</body>
</html>
