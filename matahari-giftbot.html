<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#C8102E;--red2:#A00D24;--red3:#F5E6E9;
  --gold:#F5C518;
  --bg:#FFF8F0;
  --text:#1A1A1A;--muted:#777;--border:#E8E0D8;
  --bot-bg:#FFF3F5;--bot-border:#F5CDD3;
  --user-bg:#C8102E;--user-text:#fff;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}

/* HEADER */
header{
  background:var(--red);color:#fff;
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;
  padding-top:calc(13px + env(safe-area-inset-top));
  flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
  position:relative;z-index:10;
}
.h-avatar{
  width:44px;height:44px;border-radius:50%;
  background:var(--gold);color:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:900;flex-shrink:0;
}
.h-info{flex:1}
.h-name{font-size:15px;font-weight:700}
.h-sub{font-size:11px;opacity:.8;margin-top:1px}
.h-online{
  font-size:10px;display:flex;align-items:center;gap:5px;
  margin-top:3px;opacity:.9;
}
.h-online::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:#4caf50;display:inline-block;
}
.h-logo{
  background:var(--gold);color:var(--red);
  font-size:10px;font-weight:900;letter-spacing:.5px;
  padding:5px 12px;border-radius:100px;white-space:nowrap;
}

/* STEP DOTS */
.steps{
  display:flex;align-items:center;justify-content:center;gap:0;
  padding:10px 20px;background:#fff;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.step-dot{
  width:28px;height:28px;border-radius:50%;
  background:#eee;color:#bbb;
  font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;flex-shrink:0;
}
.step-dot.done{background:var(--red);color:#fff}
.step-dot.active{background:var(--gold);color:var(--red)}
.step-line{flex:1;height:2px;background:#eee;max-width:40px;transition:background .3s}
.step-line.done{background:var(--red)}

/* CHAT */
.chat-area{
  flex:1;overflow-y:auto;
  padding:18px 14px 12px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}

/* MESSAGES */
.msg-row{display:flex;align-items:flex-end;gap:9px;max-width:90%}
.msg-row.bot{align-self:flex-start}
.msg-row.user{align-self:flex-end;flex-direction:row-reverse}
.m-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--gold);color:var(--red);
  font-size:12px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.bubble{padding:11px 15px;font-size:14px;line-height:1.55}
.msg-row.bot .bubble{
  background:var(--bot-bg);border:1px solid var(--bot-border);
  border-radius:0 14px 14px 14px;color:var(--text);
}
.msg-row.user .bubble{
  background:var(--user-bg);border:1px solid var(--red2);
  border-radius:14px 0 14px 14px;color:var(--user-text);
}
.bubble b{color:var(--red)}
.msg-row.user .bubble b{color:var(--gold)}
.m-time{font-size:10px;color:var(--muted);margin-left:4px;align-self:flex-end;white-space:nowrap}

/* TYPING */
.typing-row{display:flex;align-items:flex-end;gap:9px;align-self:flex-start}
.typing-dots{
  display:flex;gap:5px;padding:13px 16px;
  background:var(--bot-bg);border:1px solid var(--bot-border);
  border-radius:0 14px 14px 14px;
}
.typing-dots span{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);opacity:.5;
  animation:tdot 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{
  0%,60%,100%{transform:translateY(0);opacity:.5}
  30%{transform:translateY(-7px);opacity:1}
}

/* CHIPS / QUICK REPLIES */
.chips{
  display:flex;flex-wrap:wrap;gap:8px;
  align-self:flex-start;margin-left:39px;padding-bottom:2px;
}
.chip{
  display:flex;align-items:center;gap:6px;
  background:#fff;border:1.5px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;
  padding:8px 15px;border-radius:100px;
  cursor:pointer;transition:all .18s;user-select:none;
}
.chip:hover{border-color:var(--red);color:var(--red);background:var(--red3)}
.chip.sel{background:var(--red);border-color:var(--red);color:#fff}
.chip.sel:hover{background:var(--red2)}
.chip-icon{font-size:17px;line-height:1}

/* BUDGET CHIPS — pill style with price */
.budget-chips{
  display:flex;flex-direction:column;gap:7px;
  align-self:flex-start;margin-left:39px;
}
.bchip{
  background:#fff;border:1.5px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;
  padding:10px 18px;border-radius:10px;
  cursor:pointer;transition:all .18s;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  min-width:220px;
}
.bchip:hover{border-color:var(--red);color:var(--red);background:var(--red3)}
.bchip.sel{background:var(--red);border-color:var(--red);color:#fff}
.bchip-range{font-size:11px;opacity:.7;font-weight:500}

/* PRODUCT GRID */
.prod-wrap{
  align-self:flex-start;margin-left:39px;
  width:calc(100% - 39px);
}
.prod-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;
}
.prod-card{
  background:#fff;border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;
  transition:box-shadow .2s,transform .2s;
}
.prod-card:hover{box-shadow:0 4px 18px rgba(200,16,46,.15);transform:translateY(-2px)}
.prod-icon{
  width:100%;height:100px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#FFF0F3,#FFF8E7);
  font-size:42px;flex-shrink:0;
}
.prod-body{padding:10px;display:flex;flex-direction:column;gap:3px;flex:1}
.prod-cat{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.prod-name{font-size:12px;font-weight:700;line-height:1.3;color:var(--text)}
.prod-price{font-size:13px;font-weight:800;color:var(--red);margin-top:3px}
.prod-link{
  display:block;padding:7px;text-align:center;
  background:var(--red);color:#fff;
  font-size:11px;font-weight:700;letter-spacing:.3px;
  text-decoration:none;
  border-radius:0 0 10px 10px;
  margin:-10px;margin-top:6px;
  transition:background .18s;
}
.prod-link:hover{background:var(--red2)}

/* ACTION BUTTONS */
.action-row{
  display:flex;flex-wrap:wrap;gap:8px;
  align-self:flex-start;margin-left:39px;
}
.act-btn{
  background:#fff;border:1.5px solid var(--border);
  color:var(--text);font-size:13px;font-weight:600;
  padding:9px 18px;border-radius:100px;cursor:pointer;
  transition:all .18s;
}
.act-btn:hover{border-color:var(--red);color:var(--red)}
.act-btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.act-btn.primary:hover{background:var(--red2)}

/* SEPARATOR */
.sep{
  align-self:center;
  display:flex;align-items:center;gap:10px;
  font-size:10px;color:var(--muted);letter-spacing:1px;
}
.sep::before,.sep::after{content:'';width:36px;height:1px;background:var(--border)}

/* INPUT */
.input-area{
  flex-shrink:0;
  background:#fff;border-top:1px solid var(--border);
  padding:10px 14px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:9px;align-items:center;
}
.chat-input{
  flex:1;border:1.5px solid var(--border);
  padding:11px 15px;font-size:14px;border-radius:100px;
  outline:none;font-family:inherit;color:var(--text);
  background:var(--bg);transition:border-color .2s;
}
.chat-input:focus{border-color:var(--red)}
.chat-input::placeholder{color:#ccc}
.send-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--red);border:none;color:#fff;
  font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .15s;
}
.send-btn:hover{background:var(--red2);transform:scale(1.06)}
.send-btn:active{transform:scale(.95)}

@media(max-width:460px){
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .prod-icon{height:80px;font-size:34px}
  .bchip{min-width:0;width:100%}
}
</style>
</head>

  {id:'micro',   label:'Kurang dari Rp 100.000',    range:'< Rp 100rb'},
  {id:'low',     label:'Rp 100.000 – 300.000',      range:'Rp 100rb – 300rb'},
  {id:'mid',     label:'Rp 300.000 – 700.000',      range:'Rp 300rb – 700rb'},
  {id:'high',    label:'Rp 700.000 – 2.000.000',    range:'Rp 700rb – 2jt'},
  {id:'premium', label:'Di atas Rp 2.000.000',      range:'> Rp 2jt'},
];

const STEPS = ['s1','s2','s3','s4'];

function setStep(active){
  // 0-based
  STEPS.forEach((id,i)=>{
    const el = document.getElementById(id);
    el.classList.remove('active','done');
    if(i < active) el.classList.add('done');
    else if(i === active) el.classList.add('active');
    // lines
    const l = document.getElementById('l'+( i+1));
    if(l){ l.classList.toggle('done', i < active); }
  });
}

// ═══════════════════════════════════════════════════════════════════════
// CHAT HELPERS
// ═══════════════════════════════════════════════════════════════════════
const chat = document.getElementById('chatArea');

function scrollDown(){ setTimeout(()=>{ chat.scrollTop = chat.scrollHeight; },40); }

function nowTime(){
  const d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function addBotMsg(html){
  const row = document.createElement('div');
  row.className='msg-row bot';
  row.innerHTML=`<div class="m-av">S</div><div class="bubble">${html}</div><span class="m-time">${nowTime()}</span>`;
  chat.appendChild(row); scrollDown();
}

function addUserMsg(text){
  const row = document.createElement('div');
  row.className='msg-row user';
  row.innerHTML=`<div class="bubble">${text}</div><span class="m-time">${nowTime()}</span>`;
  chat.appendChild(row); scrollDown();
}

async function typing(ms=900){
  return new Promise(res=>{
    const row = document.createElement('div');
    row.className='typing-row'; row.id='__typing';
    row.innerHTML=`<div class="m-av">S</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
    chat.appendChild(row); scrollDown();
    setTimeout(()=>{ row.remove(); res(); }, ms);
  });
}

function chips(items, onClick, extraClass=''){
  const w = document.createElement('div');
  w.className='chips '+extraClass;
  items.forEach(it=>{
    const c = document.createElement('div');
    c.className='chip';
    c.innerHTML=(it.icon?`<span class="chip-icon">${it.icon}</span>`:'') + it.label;
    c.onclick=()=>{ disableChips(w); onClick(it,c,w); };
    w.appendChild(c);
  });
  chat.appendChild(w); scrollDown();
  return w;
}

function budgetButtons(onSelect){
  const w = document.createElement('div');
  w.className='budget-chips';
  BUDGETS.forEach(b=>{
    const c = document.createElement('div');
    c.className='bchip';
    c.innerHTML=`<span>${b.label}</span><span class="bchip-range">${b.range}</span>`;
    c.onclick=()=>{ disableChips(w); onSelect(b,c); };
    w.appendChild(c);
  });
  chat.appendChild(w); scrollDown();
}

function disableChips(wrap){
  wrap.querySelectorAll('.chip,.bchip').forEach(c=>{ c.onclick=null; c.style.opacity='.5'; c.style.cursor='default'; });
}

function markChip(el){
  el.classList.add('sel'); el.style.opacity='1';
}

// Action buttons (restart, more, etc.)
function actionRow(btns){
  const w = document.createElement('div');
  w.className='action-row';
  btns.forEach(b=>{
    const el = document.createElement('button');
    el.className='act-btn '+(b.primary?'primary':'');
    el.textContent=b.label;
    el.onclick=()=>{ w.remove(); b.onClick(); };
    w.appendChild(el);
  });
  chat.appendChild(w); scrollDown();
}

// ═══════════════════════════════════════════════════════════════════════
// PRODUCT KEY + LOOKUP
// ═══════════════════════════════════════════════════════════════════════
function getKey(){
  if(S.category==='pakaian')   return `pakaian_${S.gender}_${S.subtype}`;
  if(S.category==='kosmetik')  return `kosmetik_${S.gender}_${S.subtype}`;
  if(S.category==='lainnya')   return `lainnya_${S.subtype}`;
}

function getProducts(){
  const key = getKey();
  const pool = P[key];
  if(!pool) return [];
  const tier = pool[S.budget];
  if(tier && tier.length) return tier;
  // fallback to adjacent tier
  const order = ['micro','low','mid','high','premium'];
  const idx = order.indexOf(S.budget);
  for(let d=1;d<=4;d++){
    if(idx+d<=4 && pool[order[idx+d]]?.length) return pool[order[idx+d]];
    if(idx-d>=0 && pool[order[idx-d]]?.length) return pool[order[idx-d]];
  }
  return [];
}

function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

// ═══════════════════════════════════════════════════════════════════════
// FLOW STEPS
// ═══════════════════════════════════════════════════════════════════════

async function start(){
  await typing(700);
  addBotMsg('Halo! Saya <b>Sari</b>, asisten belanja Matahari kamu. 🛍️');
  await typing(800);
  addBotMsg('Saya akan bantu kamu menemukan produk yang tepat dari <b>Matahari</b>.<br>Yuk mulai! Anda ingin membeli apa?');
  askCategory();
  setStep(0);
}

function askCategory(){
  S.step='category';
  chips([
    {icon:'👗',label:'Pakaian'},
    {icon:'💄',label:'Kosmetik'},
    {icon:'🛍️',label:'Barang Lainnya'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    if(it.label==='Pakaian')          S.category='pakaian';
    else if(it.label==='Kosmetik')    S.category='kosmetik';
    else                              S.category='lainnya';
    await typing(700);
    if(S.category==='pakaian')        askGenderPakaian();
    else if(S.category==='kosmetik')  askGenderKosmetik();
    else                              askSubLainnya();
    setStep(1);
  });
}

// ── PAKAIAN ──
function askGenderPakaian(){
  addBotMsg('Pakaian untuk siapa?');
  chips([
    {icon:'👨',label:'Pria'},
    {icon:'👩',label:'Wanita'},
    {icon:'🧒',label:'Anak-anak'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    S.gender = it.label==='Pria' ? 'pria' : it.label==='Wanita' ? 'wanita' : 'anak';
    await typing(600);
    askTypePakaian();
  });
}

function askTypePakaian(){
  const who = S.gender==='anak' ? 'anak' : S.gender;
  addBotMsg(`Mau cari pakaian bagian apa untuk <b>${who}</b>?`);
  chips([
    {icon:'👕',label:'Atasan saja'},
    {icon:'👖',label:'Bawahan saja'},
    {icon:'👗',label:'Atasan & Bawahan'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    S.subtype = it.label==='Atasan saja' ? 'atasan' : it.label==='Bawahan saja' ? 'bawahan' : 'keduanya';
    await typing(600);
    askBudget();
    setStep(2);
  });
}

// ── KOSMETIK ──
function askGenderKosmetik(){
  addBotMsg('Kosmetik ini untuk siapa?');
  chips([
    {icon:'👨',label:'Pria'},
    {icon:'👩',label:'Wanita'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    S.gender = it.label==='Pria' ? 'pria' : 'wanita';
    await typing(600);
    askSubKosmetik();
  });
}

function askSubKosmetik(){
  addBotMsg(`Produk <b>${S.gender}</b> yang dibutuhkan apa?`);
  chips([
    {icon:'🧴',label:'Perawatan Tubuh'},
    {icon:'💇',label:'Perawatan Rambut'},
    {icon:'✨',label:'Parfum'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    S.subtype = it.label.includes('Tubuh') ? 'tubuh'
              : it.label.includes('Rambut') ? 'rambut' : 'parfum';
    await typing(600);
    askBudget();
    setStep(2);
  });
}

// ── BARANG LAINNYA ──
function askSubLainnya(){
  addBotMsg('Mau cari barang jenis apa?');
  chips([
    {icon:'👜',label:'Tas & Koper'},
    {icon:'💍',label:'Aksesori (Perhiasan & Kacamata)'},
  ], async(it,el,wrap)=>{
    markChip(el);
    addUserMsg(it.icon+' '+it.label);
    S.subtype = it.label.includes('Tas') ? 'tas' : 'aksesori';
    S.gender = null;
    await typing(600);
    askBudget();
    setStep(2);
  });
}

// ── BUDGET ──
function askBudget(){
  addBotMsg('Berapa maksimum <b>budget</b> kamu? Pilih salah satu:');
  budgetButtons(async(b,el)=>{
    markChip(el);
    addUserMsg('💰 '+b.label);
    S.budget=b.id; S.budgetLabel=b.label;
    await typing(1000);
    showProducts();
    setStep(3);
  });
}

// ── PRODUCTS ──
async function showProducts(showMore=false){
  const all = getProducts();
  if(!all.length){
    addBotMsg('Maaf, saya belum menemukan produk yang cocok untuk pilihan ini. Coba pilihan lain ya! 😊');
    offerRestart();
    return;
  }

  const unseen = showMore ? all.filter(p=>!S.shown.includes(p.n)) : all;
  const toShow = shuffle(unseen).slice(0, 4);

  if(!toShow.length){
    addBotMsg('Semua pilihan sudah ditampilkan! Mau cari kategori lain?');
    offerRestart();
    return;
  }

  toShow.forEach(p=>S.shown.push(p.n));

  const summary = buildSummary();
  if(!showMore){
    addBotMsg(`Oke! Berikut rekomendasi dari <b>Matahari</b> untuk kamu:<br><span style="font-size:12px;color:var(--muted)">${summary}</span>`);
  } else {
    addBotMsg('Ini pilihan lainnya yang mungkin kamu suka:');
  }

  // Product grid
  const wrap = document.createElement('div');
  wrap.className='prod-wrap';
  const grid = document.createElement('div');
  grid.className='prod-grid';

  toShow.forEach(p=>{
    const url = `https://www.matahari.com/search?q=${encodeURIComponent(p.q)}`;
    const card = document.createElement('div');
    card.className='prod-card';
    card.innerHTML=`
      <div class="prod-icon">${p.i}</div>
      <div class="prod-body">
        <div class="prod-cat">${p.cat}</div>
        <div class="prod-name">${p.n}</div>
        <div class="prod-price">${p.p}</div>
      </div>
      <a class="prod-link" href="${url}" target="_blank" rel="noopener">Lihat di Matahari &rarr;</a>
    `;
    grid.appendChild(card);
  });

  wrap.appendChild(grid);
  chat.appendChild(wrap);
  scrollDown();

  await typing(700);
  const remaining = all.filter(p=>!S.shown.includes(p.n)).length;
  addBotMsg(`Klik <b>"Lihat di Matahari"</b> untuk langsung berbelanja! Ada yang menarik? 😊`);

  const btns = [];
  if(remaining > 0) btns.push({label:'✨ Tampilkan Lebih Banyak', primary:true, onClick:()=>showProducts(true)});
  btns.push({label:'🔄 Ganti Kategori', onClick:()=>restart(false)});
  btns.push({label:'🏠 Mulai dari Awal', onClick:()=>restart(true)});
  actionRow(btns);
}

function buildSummary(){
  const parts = [];
  if(S.category==='pakaian'){
    const g = S.gender==='anak'?'Anak':S.gender==='pria'?'Pria':'Wanita';
    const t = S.subtype==='atasan'?'Atasan':S.subtype==='bawahan'?'Bawahan':'Atasan & Bawahan';
    parts.push(`Pakaian ${g} • ${t}`);
  } else if(S.category==='kosmetik'){
    const g = S.gender==='pria'?'Pria':'Wanita';
    const t = S.subtype==='tubuh'?'Perawatan Tubuh':S.subtype==='rambut'?'Perawatan Rambut':'Parfum';
    parts.push(`Kosmetik ${g} • ${t}`);
  } else {
    parts.push(S.subtype==='tas'?'Tas & Koper':'Aksesori (Perhiasan & Kacamata)');
  }
  parts.push('Budget: '+S.budgetLabel);
  return parts.join(' &nbsp;|&nbsp; ');
}

async function restart(full=true){
  chat.innerHTML='';
  if(full){
    Object.assign(S,{step:'start',category:null,gender:null,subtype:null,budget:null,budgetLabel:null,shown:[]});
    setStep(0);
    start();
  } else {
    // keep category choice, re-ask subcategory
    Object.assign(S,{gender:null,subtype:null,budget:null,budgetLabel:null,shown:[]});
    addBotMsg('Oke, mari kita mulai lagi! Anda ingin membeli apa?');
    askCategory();
    setStep(0);
  }
}

function offerRestart(){
  actionRow([
    {label:'🏠 Mulai dari Awal', primary:true, onClick:()=>restart(true)},
  ]);
}

// ═══════════════════════════════════════════════════════════════════════
// TEXT INPUT HANDLER
// ═══════════════════════════════════════════════════════════════════════
function handleText(){
  const inp = document.getElementById('chatInput');
  const t = inp.value.trim();
  if(!t) return;
  inp.value='';
  // Simple keyword mapping for text input
  const low = t.toLowerCase();
  addUserMsg(t);
  setTimeout(async()=>{
    await typing(600);
    if(/pakaian|baju|kemeja|celana|rok|dress|kaos|jaket/i.test(low)){
      addBotMsg('Silakan klik tombol <b>Pakaian</b> di atas untuk memulai, atau ketik ulang jika tombolnya sudah hilang. 😊');
    } else if(/kosmetik|skincare|parfum|makeup|rambut|lotion/i.test(low)){
      addBotMsg('Silakan klik tombol <b>Kosmetik</b> di atas! 😊');
    } else if(/tas|koper|dompet|aksesori|perhiasan|kacamata/i.test(low)){
      addBotMsg('Silakan klik tombol <b>Barang Lainnya</b> di atas! 😊');
    } else if(/ulang|restart|awal|mulai/i.test(low)){
      restart(true);
    } else {
      addBotMsg('Hei! Gunakan tombol pilihan di atas ya, atau ketik <b>"mulai ulang"</b> untuk memulai dari awal. 😊');
    }
  },0);
}

// INIT
start();
</script>
